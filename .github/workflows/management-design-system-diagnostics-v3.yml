name: Management Design System Diagnostics V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run full unit suite and preserve complete output
        id: unit
        shell: bash
        run: |
          set +e
          npm test > management-unit-test.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 300 management-unit-test.log
          exit 0

      - name: Capture workflow and enforcement sources
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          grep -RIl "MX Atomic Design Enforcement" .github scripts src > atomic-design-source-files.txt || true
          tar -czf management-ci-sources.tar.gz .github scripts package.json package-lock.json

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-design-system-diagnostics-v3
          path: |
            management-unit-test.log
            management-ci-sources.tar.gz
            atomic-design-source-files.txt
          retention-days: 1

      - name: Fail after evidence upload
        if: steps.unit.outputs.exit_code != '0'
        run: exit 1
