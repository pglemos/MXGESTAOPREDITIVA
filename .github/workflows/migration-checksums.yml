name: Migration Checksums (forward-only)

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/gen_migration_checksums.mjs'
      - '.github/workflows/migration-checksums.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checksums:
    name: Migrations congeladas são imutáveis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar integridade das migrations congeladas
        run: node scripts/gen_migration_checksums.mjs --check
