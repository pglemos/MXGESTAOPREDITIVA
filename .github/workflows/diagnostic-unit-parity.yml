name: Diagnostic Unit Parity

on:
  pull_request:
    branches: [main]

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Run tests and preserve complete output
        id: tests
        shell: bash
        run: |
          set +e
          npm test > unit-test.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 250 unit-test.log
          exit 0
      - name: Build source audit snapshot
        run: |
          tar -czf source-audit.tar.gz src package.json vite.config.* tailwind.config.* 2>/dev/null || \
            tar -czf source-audit.tar.gz src package.json
      - name: Upload diagnostic evidence
        uses: actions/upload-artifact@v4
        with:
          name: design-system-audit
          path: |
            unit-test.log
            source-audit.tar.gz
          retention-days: 1
      - name: Fail after artifact upload
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
