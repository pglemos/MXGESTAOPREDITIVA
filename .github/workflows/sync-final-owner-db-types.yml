name: Sync Final Owner DB Types

on:
  push:
    branches:
      - feat/owner-base44-parity-20260718
    paths:
      - '.github/workflows/sync-final-owner-db-types.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/owner-base44-parity-20260718
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Validate secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Secrets SUPABASE_ACCESS_TOKEN e SUPABASE_PROJECT_ID nao configurados."
            exit 1
          fi
          if [ "$SUPABASE_PROJECT_ID" != "fbhcmzzgwjdgkctlfvbo" ]; then
            echo "::error::SUPABASE_PROJECT_ID aponta para um projeto inesperado."
            exit 1
          fi

      - name: Generate exact public schema types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_ID" \
            --schema public \
            | grep -v '^Initialising login role' \
            | grep -v '^A new version of Supabase CLI' \
            | grep -v '^We recommend updating regularly' \
            > /tmp/db_remote.ts

          cat > src/types/database.generated.ts <<'HEADER'
          // AUTO-GENERATED by `npm run gen:db-types` — DO NOT EDIT MANUALLY.
          // Source: Supabase project fbhcmzzgwjdgkctlfvbo (MX GESTAO PREDITIVA)
          // Regenerate after every migration: `npm run gen:db-types`
          // CI gate: .github/workflows/db-types-diff.yml bloqueia merge se houver drift.

          HEADER
          cat /tmp/db_remote.ts >> src/types/database.generated.ts

      - name: Commit synchronized types when changed
        run: |
          if git diff --quiet -- src/types/database.generated.ts; then
            echo "database.generated.ts ja esta sincronizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/database.generated.ts
          git commit -m "chore(db): sincronizar tipos do projeto MX"
          git push origin HEAD:feat/owner-base44-parity-20260718
