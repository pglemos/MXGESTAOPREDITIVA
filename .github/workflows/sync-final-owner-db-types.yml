name: Sync Final Owner DB Types

on:
  push:
    branches:
      - feat/owner-base44-parity-20260718
    paths:
      - .github/workflows/sync-final-owner-db-types.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/owner-base44-parity-20260718
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate types from linked Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase@latest gen types typescript --project-id fbhcmzzgwjdgkctlfvbo > src/types/database.generated.ts
      - name: Commit synchronized types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/database.generated.ts
          git commit -m "chore(db): sincronizar tipos após atualizar main" || true
          git push origin HEAD:feat/owner-base44-parity-20260718
