name: PDI Authorization Development

on:
  push:
    branches: [fix/harden-pdi-session-and-evidence-authorization]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717270000_harden_pdi_authorization.sql'
      - 'src/lib/pdi-authorization-hardening.test.ts'
      - '.github/workflows/pdi-authorization-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - name: Capture PDI authorization contract output
        id: focused_test
        shell: bash
        run: |
          set +e
          bun test --isolate src/lib/pdi-authorization-hardening.test.ts > pdi-authorization-test.log 2>&1
          status=$?
          echo "$status" > pdi-authorization-test.status
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdi-authorization-test-diagnostics
          path: |
            pdi-authorization-test.log
            pdi-authorization-test.status
      - name: Enforce focused test result
        run: test "${{ steps.focused_test.outputs.exit_code }}" = "0"
      - name: Migration reversibility
        run: node scripts/check_migration_reversibility.mjs --changed-only
