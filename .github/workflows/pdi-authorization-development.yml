name: PDI Authorization Development

on:
  push:
    branches: [fix/harden-pdi-session-and-evidence-authorization]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717270000_harden_pdi_authorization.sql'
      - 'src/lib/pdi-authorization-hardening.test.ts'
      - '.github/workflows/pdi-authorization-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - name: PDI authorization contract
        run: bun test --isolate src/lib/pdi-authorization-hardening.test.ts
      - name: Migration reversibility
        run: node scripts/check_migration_reversibility.mjs --changed-only
