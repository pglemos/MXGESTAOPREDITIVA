name: Module Design System Parity

on:
  pull_request:
    paths:
      - 'src/**'
      - 'packages/**'
      - '.github/workflows/module-design-system-parity.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'
      - '.github/workflows/module-design-system-parity.yml'

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-24.04
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify module design system parity
        run: bun test src/test/module-design-system-parity.test.ts src/components/MxSidebarShell.test.ts src/components/module/MxModuleVisualPrimitives.test.tsx
