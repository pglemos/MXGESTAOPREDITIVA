name: Central Design Token Codemod Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/central-token-codemod-once.yml'

permissions:
  contents: write
  statuses: write

concurrency:
  group: central-token-codemod
  cancel-in-progress: true

jobs:
  codemod:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish pending commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f context='Central Token Codemod' \
            -f description='Replacing hardcoded Central colors with MX tokens' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Replace, verify and commit exact token mappings
        id: codemod
        continue-on-error: true
        shell: bash
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
        run: |
          mkdir -p verification-logs
          set -o pipefail
          {
            python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('src/features/central-execucao')
          replacements = {
              'text-[#005BFF]': 'text-status-info',
              'bg-[#005BFF]': 'bg-status-info',
              'border-[#005BFF]': 'border-status-info',
              'ring-[#005BFF]': 'ring-status-info',
              'shadow-[#005BFF]': 'shadow-status-info',
              'from-[#005BFF]': 'from-status-info',
              'to-[#005BFF]': 'to-status-info',
              'fill-[#005BFF]': 'fill-status-info',
              'stroke-[#005BFF]': 'stroke-status-info',
              'outline-[#005BFF]': 'outline-status-info',
              'text-[#0F172A]': 'text-mx-text',
              'bg-[#0F172A]': 'bg-mx-text',
              'border-[#0F172A]': 'border-mx-text',
              'ring-[#0F172A]': 'ring-mx-text',
              'shadow-[#0F172A]': 'shadow-mx-text',
              'from-[#0F172A]': 'from-mx-text',
              'to-[#0F172A]': 'to-mx-text',
              'fill-[#0F172A]': 'fill-mx-text',
              'stroke-[#0F172A]': 'stroke-mx-text',
              'text-[#F8FAFC]': 'text-mx-bg',
              'bg-[#F8FAFC]': 'bg-mx-bg',
              'border-[#F8FAFC]': 'border-mx-bg',
              'from-[#F8FAFC]': 'from-mx-bg',
              'to-[#F8FAFC]': 'to-mx-bg',
              'text-[#E5E7EB]': 'text-mx-border',
              'bg-[#E5E7EB]': 'bg-mx-border',
              'border-[#E5E7EB]': 'border-mx-border',
              'ring-[#E5E7EB]': 'ring-mx-border',
              'from-[#E5E7EB]': 'from-mx-border',
              'to-[#E5E7EB]': 'to-mx-border',
          }

          changed = []
          for path in sorted(root.rglob('*')):
              if path.suffix not in {'.ts', '.tsx', '.js', '.jsx'}:
                  continue
              original = path.read_text(encoding='utf-8')
              updated = original
              for source, target in replacements.items():
                  updated = updated.replace(source, target)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          leftovers = []
          pattern = re.compile(r'#[0-9A-Fa-f]{6}')
          for path in sorted(root.rglob('*')):
              if path.suffix not in {'.ts', '.tsx', '.js', '.jsx'}:
                  continue
              for line_number, line in enumerate(path.read_text(encoding='utf-8').splitlines(), 1):
                  matches = pattern.findall(line)
                  if matches:
                      leftovers.append(f'{path}:{line_number}: {", ".join(matches)}')

          print(f'Changed {len(changed)} files:')
          for path in changed:
              print(f'  - {path}')

          if leftovers:
              print('Unmapped color literals remain:')
              for item in leftovers:
                  print(f'  - {item}')
              raise SystemExit(1)
          PY

            git diff --check
            bun test --isolate src/features/central-execucao src/lib/central-execucao-migration.test.ts
            npm run typecheck
            npm run lint:tokens
            npm run lint:a11y
            npm run build

            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add src/features/central-execucao
            if git diff --cached --quiet; then
              echo 'No token changes to commit.'
            else
              git commit -m 'fix(central): replace hardcoded colors with design tokens'
              git push origin HEAD:main
            fi
          } 2>&1 | tee verification-logs/codemod.log

      - name: Upload codemod logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-token-codemod-logs
          path: verification-logs/
          retention-days: 14

      - name: Publish final commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.codemod.outcome }}" = "success" ]; then
            STATE=success
            DESCRIPTION='Token replacement, tests, lint and build passed'
          else
            STATE=failure
            DESCRIPTION='Token codemod failed; inspect workflow logs'
          fi

          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$STATE" \
            -f context='Central Token Codemod' \
            -f description="$DESCRIPTION" \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Fail workflow when codemod fails
        if: steps.codemod.outcome != 'success'
        run: exit 1
