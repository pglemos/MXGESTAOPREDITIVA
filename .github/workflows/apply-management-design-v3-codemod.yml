name: Apply Management Design V3 Codemod

on:
  push:
    branches:
      - fix/remover-legado-design-system-v3
    paths:
      - 'scripts/apply-management-design-v3-codemod.mjs'
      - '.github/workflows/apply-management-design-v3-codemod.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remover-legado-design-system-v3
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply idempotent visual migration
        run: node scripts/apply-management-design-v3-codemod.mjs

      - name: Verify expanded source contract
        run: node --test scripts/audit-management-design-system.test.mjs scripts/management-route-manifest.test.mjs

      - name: Commit generated migration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'mx-design-system-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add src/features/lojas scripts/audit-management-design-system.mjs scripts/audit-management-design-system.test.mjs .github/workflows/module-design-system-authenticated-visual.yml
          git commit -m 'fix: remover legado visual de toda a árvore de lojas'
          git push origin HEAD:fix/remover-legado-design-system-v3
