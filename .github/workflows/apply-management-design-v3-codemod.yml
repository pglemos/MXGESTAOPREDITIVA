name: Apply Management Design V3 Codemod

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-management-design-v3-codemod-v2.mjs'
      - 'scripts/apply-management-shell-scope-fix.mjs'
      - '.github/workflows/apply-management-design-v3-codemod.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'fix/remover-legado-design-system-v3' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply idempotent visual migration
        run: |
          node scripts/apply-management-design-v3-codemod-v2.mjs
          node scripts/apply-management-shell-scope-fix.mjs

      - name: Capture expanded source contract
        continue-on-error: true
        shell: bash
        run: |
          node --test scripts/audit-management-design-system.test.mjs scripts/management-route-manifest.test.mjs 2>&1 | tee management-codemod-contract.log

      - name: Commit generated migration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'mx-design-system-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add src/components/Layout.tsx src/features/lojas scripts/audit-management-design-system.mjs scripts/audit-management-design-system.test.mjs
          git commit -m 'fix: aplicar escopo gerencial ao shell e remover legado visual'
          git push origin HEAD:${{ github.event.pull_request.head.ref || 'fix/remover-legado-design-system-v3' }}
