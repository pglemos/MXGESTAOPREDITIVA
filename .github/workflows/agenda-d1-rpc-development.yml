name: Agenda D1 RPC Development

on:
  push:
    branches: [feat/agenda-d1-direct-rpcs]
  pull_request:
    branches: [main]
    paths:
      - 'src/features/manager/daily-closing/AgendaD1Panel.tsx'
      - 'src/features/manager/daily-closing/AgendaD1Panel-rpc-contract.test.ts'
      - '.github/workflows/agenda-d1-rpc-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - name: Export source for controlled edit
        uses: actions/upload-artifact@v4
        with:
          name: agenda-d1-source
          path: src/features/manager/daily-closing/AgendaD1Panel.tsx
          if-no-files-found: error
          retention-days: 2
      - name: RPC contract test
        run: bun test --isolate src/features/manager/daily-closing/AgendaD1Panel-rpc-contract.test.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
