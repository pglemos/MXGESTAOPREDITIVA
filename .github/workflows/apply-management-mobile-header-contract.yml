name: Apply Management Mobile Header Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/fix-management-mobile-header-contract.mjs'
      - '.github/workflows/apply-management-mobile-header-contract.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'fix/remover-legado-design-system-v3' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply responsive visual contract
        run: node scripts/fix-management-mobile-header-contract.mjs

      - name: Commit visual contract
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'mx-design-system-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add src/test/module-design-system-authenticated-visual.playwright.ts
          git commit -m 'test: alinhar cabeçalho mobile à referência gerencial'
          git push origin HEAD:${{ github.event.pull_request.head.ref || 'fix/remover-legado-design-system-v3' }}
