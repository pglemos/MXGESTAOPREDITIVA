name: Typecheck and unit tests

# P0-05c (Auditoria Integral 2026-07-10): antes deste workflow, NENHUM check
# de CI rodava `tsc --noEmit` (typecheck) ou `bun test` (726 testes
# unitarios/contrato) — os workflows existentes (atomic-lint,
# eslint-a11y, bundle-budget, db-types-diff, migration-reversibility,
# rls-matrix, smoke-403, gitleaks, coderabbit-review, storybook-build)
# cobrem lint de tokens, a11y, bundle size, contratos SQL/RLS e secrets, mas
# nenhum deles valida que o codigo compila (tipos) ou que os testes passam.
# Um PR com erro de tipo ou teste quebrado podia ser mergeado sem nenhum
# check vermelho. Nao depende de secrets — roda 100% local ao runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    # O cliente Supabase e inicializado no import. Estes valores sao apenas
    # placeholders publicos para testes unitarios; nenhuma chamada real depende
    # deles e nenhum secret de ambiente e necessario neste job.
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Unit tests (bun test)
        shell: bash
        run: |
          set +e
          npm test > /tmp/mx-unit-tests.log 2>&1
          status=$?
          tail -n 80 /tmp/mx-unit-tests.log
          exit $status
      - name: Upload diagnostic test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mx-unit-tests-diagnostic
          path: /tmp/mx-unit-tests.log
          if-no-files-found: error
          retention-days: 1
