name: Security Invoker Views Development

on:
  push:
    branches: [fix/security-invoker-views]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717190000_security_invoker_views.sql'
      - 'src/lib/security-invoker-views-migration.test.ts'
      - 'src/types/database.generated.ts'
      - '.github/workflows/security-invoker-views-development.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/security-invoker-views
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: npm ci

      - name: Run migration contract
        run: bun test --isolate src/lib/security-invoker-views-migration.test.ts

      - name: Check migration rollback documentation
        run: node scripts/check_migration_reversibility.mjs --changed-only

      - name: Generate production database types and diff
        id: types
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set +e
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_ID" \
            --schema public \
            > database.generated.production.ts 2> database-types-command.log
          status=$?
          if [ "$status" -eq 0 ]; then
            tail -n +6 src/types/database.generated.ts > database.generated.committed-body.ts
            diff -u database.generated.committed-body.ts database.generated.production.ts > database-types.diff
            diff_status=$?
          else
            diff_status=2
          fi
          echo "command_exit=$status" >> "$GITHUB_OUTPUT"
          echo "diff_exit=$diff_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload database type diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-view-database-types
          path: |
            database.generated.production.ts
            database.generated.committed-body.ts
            database-types.diff
            database-types-command.log
          if-no-files-found: warn
          retention-days: 2

      - name: Synchronize committed database types
        id: sync_types
        if: steps.types.outputs.command_exit == '0' && steps.types.outputs.diff_exit == '1'
        shell: bash
        run: |
          set +e
          {
            echo '// AUTO-GENERATED by `npm run gen:db-types` — DO NOT EDIT MANUALLY.'
            echo '// Source: Supabase project fbhcmzzgwjdgkctlfvbo (MX GESTAO PREDITIVA)'
            echo '// Regenerate after every migration: `npm run gen:db-types`'
            echo '// CI gate: .github/workflows/db-types-diff.yml bloqueia merge se houver drift.'
            echo
            cat database.generated.production.ts
          } > src/types/database.generated.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/database.generated.ts
          git commit -m "chore(db): synchronize generated production types" > database-types-sync.log 2>&1
          commit_status=$?
          if [ "$commit_status" -eq 0 ]; then
            git push origin HEAD:fix/security-invoker-views >> database-types-sync.log 2>&1
            push_status=$?
          else
            push_status=2
          fi
          echo "commit_exit=$commit_status" >> "$GITHUB_OUTPUT"
          echo "push_exit=$push_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload generated-type synchronization log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-view-type-sync
          path: database-types-sync.log
          if-no-files-found: ignore
          retention-days: 2

      - name: Rebuild local Supabase and capture migration log
        id: local_supabase
        shell: bash
        run: |
          set +e
          supabase start > supabase-start.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          supabase status > supabase-status.log 2>&1
          supabase stop --no-backup >> supabase-start.log 2>&1
          exit 0

      - name: Upload local Supabase diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-view-local-supabase
          path: |
            supabase-start.log
            supabase-status.log
          if-no-files-found: error
          retention-days: 2

      - name: Summarize diagnostic status
        shell: bash
        run: |
          echo "Types command exit: ${{ steps.types.outputs.command_exit }}"
          echo "Types diff exit: ${{ steps.types.outputs.diff_exit }}"
          echo "Types commit exit: ${{ steps.sync_types.outputs.commit_exit }}"
          echo "Types push exit: ${{ steps.sync_types.outputs.push_exit }}"
          echo "Local Supabase exit: ${{ steps.local_supabase.outputs.exit_code }}"
