name: Security Invoker Views Development

on:
  push:
    branches: [fix/security-invoker-views]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717190000_security_invoker_views.sql'
      - 'src/lib/security-invoker-views-migration.test.ts'
      - '.github/workflows/security-invoker-views-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run migration contract
        id: contract
        shell: bash
        run: |
          set +e
          bun test --isolate src/lib/security-invoker-views-migration.test.ts > security-view-test.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload contract log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-view-test-log
          path: security-view-test.log
          if-no-files-found: error
          retention-days: 2
      - name: Fail on contract error
        if: steps.contract.outputs.exit_code != '0'
        run: |
          cat security-view-test.log
          exit 1
