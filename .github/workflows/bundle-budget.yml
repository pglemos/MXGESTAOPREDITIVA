name: bundle-budget

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'scripts/check_bundle_size.mjs'
      - '.github/workflows/bundle-budget.yml'

jobs:
  budget:
    name: Bundle size budget (Story 3.15)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build (production)
        run: npm run build

      - name: Check bundle size budgets
        run: npm run check:bundle-size
