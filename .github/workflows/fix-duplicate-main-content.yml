name: Fix Duplicate Main Content Landmarks

on:
  push:
    branches:
      - fix/unificar-design-system-admin-owner
    paths:
      - 'scripts/fix-duplicate-main-content.mjs'
      - '.github/workflows/fix-duplicate-main-content.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unificar-design-system-admin-owner
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Remove duplicate landmarks
        run: node scripts/fix-duplicate-main-content.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify focused contracts
        run: npx bun test src/test/module-design-system-parity.test.ts src/components/MxSidebarShell.test.ts
      - name: Verify types
        run: npm run typecheck
      - name: Commit generated correction
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Nenhuma alteração gerada.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src
          git commit -m 'fix: remover landmarks main-content duplicados'
          git push origin HEAD:fix/unificar-design-system-admin-owner
