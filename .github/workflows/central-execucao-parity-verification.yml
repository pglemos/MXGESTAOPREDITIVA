name: Central Execucao Parity Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/features/central-execucao/**'
      - 'src/features/crm/CentralExecucao.container.tsx'
      - 'src/features/crm/hooks/useExecutionActions.ts'
      - 'src/lib/central-execucao-migration.test.ts'
      - 'src/types/database.generated.ts'
      - 'supabase/migrations/20260716170000_central_execucao_canonical_queue.sql'
      - '.github/workflows/central-execucao-parity-verification.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/features/central-execucao/**'
      - 'src/features/crm/CentralExecucao.container.tsx'
      - 'src/features/crm/hooks/useExecutionActions.ts'
      - 'src/lib/central-execucao-migration.test.ts'
      - 'src/types/database.generated.ts'
      - 'supabase/migrations/20260716170000_central_execucao_canonical_queue.sql'
      - '.github/workflows/central-execucao-parity-verification.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Central verification and preserve logs
        shell: bash
        run: |
          mkdir -p verification-logs
          set +e
          bun test --isolate src/features/central-execucao > verification-logs/central-tests.log 2>&1
          CENTRAL_TESTS=$?
          npm run typecheck > verification-logs/typecheck.log 2>&1
          TYPECHECK=$?
          npm run lint:tokens > verification-logs/lint-tokens.log 2>&1
          TOKENS=$?
          npm run build > verification-logs/build.log 2>&1
          BUILD=$?
          printf 'central_tests=%s\ntypecheck=%s\nlint_tokens=%s\nbuild=%s\n' "$CENTRAL_TESTS" "$TYPECHECK" "$TOKENS" "$BUILD" | tee verification-logs/summary.txt
          if [ "$CENTRAL_TESTS" -ne 0 ] || [ "$TYPECHECK" -ne 0 ] || [ "$TOKENS" -ne 0 ] || [ "$BUILD" -ne 0 ]; then
            exit 1
          fi
      - name: Upload complete verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-execucao-verification-logs
          path: verification-logs/
          retention-days: 14
