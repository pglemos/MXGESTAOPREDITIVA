name: Central Execucao Parity Verification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/features/central-execucao/**'
      - 'src/features/crm/CentralExecucao.container.tsx'
      - 'src/features/crm/hooks/useExecutionActions.ts'
      - 'src/lib/central-execucao-migration.test.ts'
      - 'src/types/database.generated.ts'
      - 'supabase/migrations/20260716170000_central_execucao_canonical_queue.sql'
      - '.github/workflows/central-execucao-parity-verification.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/features/central-execucao/**'
      - 'src/features/crm/CentralExecucao.container.tsx'
      - 'src/features/crm/hooks/useExecutionActions.ts'
      - 'src/lib/central-execucao-migration.test.ts'
      - 'src/types/database.generated.ts'
      - 'supabase/migrations/20260716170000_central_execucao_canonical_queue.sql'
      - '.github/workflows/central-execucao-parity-verification.yml'

permissions:
  contents: read
  statuses: write

concurrency:
  group: central-execucao-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4

      - name: Publish pending commit status
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f context='Central Verification' \
            -f description='Central verification is running' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Central verification and preserve logs
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p verification-logs
          set +e

          bun test --isolate \
            src/features/central-execucao \
            src/lib/central-execucao-migration.test.ts \
            > verification-logs/central-tests.log 2>&1
          CENTRAL_TESTS=$?

          npm run typecheck > verification-logs/typecheck.log 2>&1
          TYPECHECK=$?

          npm run lint:tokens > verification-logs/lint-tokens.log 2>&1
          TOKENS=$?

          npm run lint:a11y > verification-logs/lint-a11y.log 2>&1
          A11Y=$?

          npm run build > verification-logs/build.log 2>&1
          BUILD=$?

          printf 'central_tests=%s\ntypecheck=%s\nlint_tokens=%s\nlint_a11y=%s\nbuild=%s\n' \
            "$CENTRAL_TESTS" "$TYPECHECK" "$TOKENS" "$A11Y" "$BUILD" \
            | tee verification-logs/summary.txt

          if [ "$CENTRAL_TESTS" -ne 0 ] \
            || [ "$TYPECHECK" -ne 0 ] \
            || [ "$TOKENS" -ne 0 ] \
            || [ "$A11Y" -ne 0 ] \
            || [ "$BUILD" -ne 0 ]; then
            exit 1
          fi

      - name: Upload complete verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-execucao-verification-logs
          path: verification-logs/
          retention-days: 14

      - name: Publish final commit status
        if: always() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.verify.outcome }}" = "success" ]; then
            STATE=success
            DESCRIPTION='Central tests, types, lint and build passed'
          else
            STATE=failure
            DESCRIPTION='Central verification failed; inspect workflow logs'
          fi

          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$STATE" \
            -f context='Central Verification' \
            -f description="$DESCRIPTION" \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Fail workflow when verification fails
        if: steps.verify.outcome != 'success'
        run: exit 1
