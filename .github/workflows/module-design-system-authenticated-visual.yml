name: Module Design System Authenticated Visual

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/visual/helpers.ts'
      - 'src/components/**'
      - 'src/design-system/**'
      - 'src/features/**'
      - 'src/pages/**'
      - 'src/main.tsx'
      - 'src/test/module-design-system-authenticated-visual.playwright.ts'
      - 'src/test/management-design-system-route-matrix.playwright.ts'
      - 'src/test/module-route-visual-audit.playwright.ts'
      - '.github/workflows/module-design-system-authenticated-visual.yml'

permissions:
  contents: read

jobs:
  authenticated-visual:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      VITE_SUPABASE_URL: https://fbhcmzzgwjdgkctlfvbo.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_etxw6xyht7S_g8epHpqsJw_wB6x9d9k
      E2E_ROLE_PASSWORD: ${{ secrets.E2E_ROLE_PASSWORD }}
      E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run isolated five-profile visual matrix
        run: >
          npx playwright test
          src/test/module-design-system-authenticated-visual.playwright.ts
          --project=chromium --workers=1
      - name: Run full management route matrix
        run: >
          npx playwright test
          src/test/management-design-system-route-matrix.playwright.ts
          --project=chromium --workers=1
      - name: Detect authenticated audit credentials
        id: auth
        shell: bash
        run: |
          if [[ -n "${E2E_ROLE_PASSWORD:-}" || -n "${E2E_AUTH_PASSWORD:-}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Authenticated route audit skipped because E2E_ROLE_PASSWORD/E2E_AUTH_PASSWORD is not configured. The isolated five-profile visual matrix and dedicated RLS/route-contract gates still run."
          fi
      - name: Run authenticated route visual audit
        if: steps.auth.outputs.available == 'true'
        run: >
          npx playwright test
          src/test/module-route-visual-audit.playwright.ts
          --project=chromium --workers=1
      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-design-system-authenticated-visual
          path: |
            test-results/
            playwright-report/
          retention-days: 14
