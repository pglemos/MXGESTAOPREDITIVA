name: Sync DB Types Branch

on:
  push:
    branches:
      - fix/unificar-design-system-admin-owner
    paths:
      - '.github/workflows/sync-db-types-branch.yml'
      - 'supabase/migrations/**'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unificar-design-system-admin-owner
          fetch-depth: 0
      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0
      - name: Generate linked project types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          {
            printf '%s\n' '// AUTO-GENERATED by `npm run gen:db-types` — DO NOT EDIT MANUALLY.'
            printf '%s\n' '// Source: Supabase project fbhcmzzgwjdgkctlfvbo (MX GESTAO PREDITIVA)'
            printf '%s\n' '// Regenerate after every migration: `npm run gen:db-types`'
            printf '%s\n\n' '// CI gate: .github/workflows/db-types-diff.yml bloqueia merge se houver drift.'
            supabase gen types typescript \
              --project-id "$SUPABASE_PROJECT_ID" \
              --schema public \
              | grep -v '^Initialising login role' \
              | grep -v '^A new version of Supabase CLI' \
              | grep -v '^We recommend updating regularly'
          } > src/types/database.generated.ts
      - name: Commit generated contract
        run: |
          if git diff --quiet -- src/types/database.generated.ts; then
            echo 'Types already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/types/database.generated.ts
          git commit -m 'chore: sincronizar tipos do Supabase'
          git push origin HEAD:fix/unificar-design-system-admin-owner
