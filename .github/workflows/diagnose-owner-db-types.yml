name: Diagnose Owner DB Types

on:
  push:
    branches:
      - feat/owner-base44-parity-20260718
    paths:
      - .github/workflows/diagnose-owner-db-types.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/owner-base44-parity-20260718
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and capture exact drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cp src/types/database.generated.ts /tmp/database.before.ts
          npx supabase@latest gen types typescript --project-id fbhcmzzgwjdgkctlfvbo > /tmp/database.after.ts
          {
            echo "before_sha=$(sha256sum /tmp/database.before.ts | cut -d' ' -f1)"
            echo "after_sha=$(sha256sum /tmp/database.after.ts | cut -d' ' -f1)"
            echo "supabase_version=$(npx supabase@latest --version)"
            echo
            echo "--- DIFF (first 500 lines) ---"
            diff -u /tmp/database.before.ts /tmp/database.after.ts | head -500 || true
          } > docs/debug-owner-db-types.txt
          cp /tmp/database.after.ts src/types/database.generated.ts

      - name: Commit evidence and exact generated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/database.generated.ts docs/debug-owner-db-types.txt
          git commit -m "chore(db): registrar drift exato dos tipos" || true
          git push origin HEAD:feat/owner-base44-parity-20260718
