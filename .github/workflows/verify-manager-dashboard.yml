name: Verify Manager Dashboard

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/features/manager/home/**'
      - 'src/features/dashboard-loja/**'
      - 'src/lib/managerial-p0-*-migration.test.ts'
      - '.github/workflows/verify-manager-dashboard.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Targeted tests
        run: bun test --isolate --max-concurrency=1 src/features/manager/home/manager-home-parity.test.ts src/features/manager/home/manager-home-official-ratio.test.ts src/features/manager/home/useManagerHomeOfficialSources.test.ts src/lib/managerial-p0-data-foundation-migration.test.ts src/lib/managerial-p0-d1-runtime-fix-migration.test.ts src/lib/managerial-p0-legacy-d1-bridge-migration.test.ts

      - name: Run full unit suite
        id: full_tests
        shell: bash
        run: |
          set +e
          npm test > mx-unit-tests.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full unit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-dashboard-full-unit-log
          path: mx-unit-tests.log
          if-no-files-found: error
          retention-days: 2

      - name: Fail when full unit suite fails
        if: steps.full_tests.outputs.exit_code != '0'
        shell: bash
        run: |
          tail -n 120 mx-unit-tests.log
          exit 1

      - name: Build
        run: npm run build
