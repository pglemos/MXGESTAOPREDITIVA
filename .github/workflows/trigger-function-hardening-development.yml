name: Trigger Function Hardening Development

on:
  push:
    branches: [fix/revoke-trigger-function-execute]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717200000_revoke_trigger_function_execute.sql'
      - 'src/lib/trigger-function-execute-hardening.test.ts'
      - '.github/workflows/trigger-function-hardening-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - name: Trigger function contract
        run: bun test --isolate src/lib/trigger-function-execute-hardening.test.ts
      - name: Migration reversibility
        run: node scripts/check_migration_reversibility.mjs --changed-only
