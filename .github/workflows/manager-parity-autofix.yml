name: Manager Parity Autofix

# One-shot deterministic patch for the dedicated parity branch.
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/manager-parity-autofix.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/manager-daily-closing-base44-parity-20260714'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/manager-daily-closing-base44-parity-20260714
          fetch-depth: 0

      - name: Apply deterministic source corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          closing_path = Path('src/features/manager/daily-closing/ManagerDailyClosingBase44.tsx')
          closing = closing_path.read_text(encoding='utf-8')
          closing = closing.replace(
              'if (!checkin || checkin.submission_status === "draft") return "Pendente";',
              'if (!checkin) return "Pendente";',
              1,
          )
          if 'if (!checkin) return "Pendente";' not in closing:
              raise SystemExit(f'{closing_path}: corrected status guard not present')
          closing_path.write_text(closing, encoding='utf-8')

          regularize_path = Path('src/features/manager/daily-closing/RegularizeLateModal.tsx')
          regularize = regularize_path.read_text(encoding='utf-8')
          old_time = 'return format(parseISO(value), "HH:mm");'
          new_time = '''const civilTime = value.match(/T(\\d{2}):(\\d{2})/);
              if (civilTime) return `${civilTime[1]}:${civilTime[2]}`;
              return format(parseISO(value), "HH:mm");'''
          regularize = regularize.replace(old_time, new_time, 1)
          if 'const civilTime = value.match' not in regularize:
              raise SystemExit(f'{regularize_path}: civil time guard not present')
          regularize_path.write_text(regularize, encoding='utf-8')

          modal_path = Path('src/components/organisms/Modal.tsx')
          modal = modal_path.read_text(encoding='utf-8')
          modal = modal.replace(
              '"items-start gap-4 border-b border-gray-100 p-5"',
              '"items-start gap-4 border-b border-gray-100 px-5 py-4"',
              1,
          )
          if '"items-start gap-4 border-b border-gray-100 px-5 py-4"' not in modal:
              raise SystemExit(f'{modal_path}: corrected reference header class not present')
          modal_path.write_text(modal, encoding='utf-8')
          PY

      - name: Commit patched sources
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/features/manager/daily-closing/ManagerDailyClosingBase44.tsx \
                  src/features/manager/daily-closing/RegularizeLateModal.tsx \
                  src/components/organisms/Modal.tsx
          git commit -m 'fix(manager): resolve parity verification failures'
          git push origin HEAD:fix/manager-daily-closing-base44-parity-20260714
