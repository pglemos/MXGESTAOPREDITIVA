name: Authenticated User RPC Hardening Development

on:
  push:
    branches: [fix/revoke-anon-authenticated-user-rpcs]
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/20260717230000_revoke_anon_authenticated_user_rpcs.sql'
      - 'src/lib/authenticated-user-rpc-acl-hardening.test.ts'
      - '.github/workflows/authenticated-user-rpc-hardening-development.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - name: Authenticated user RPC ACL contract
        run: bun test --isolate src/lib/authenticated-user-rpc-acl-hardening.test.ts
      - name: Migration reversibility
        run: node scripts/check_migration_reversibility.mjs --changed-only
