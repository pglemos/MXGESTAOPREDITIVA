name: Management Design System Audit V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  source-snapshot:
    name: Full management visual audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate deterministic package integrity
        id: package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t asset_parts < <(printf '%s\n' scripts/management-v3-assets.tar.gz.b64.part* | sort -V)

          if (( ${#asset_parts[@]} == 0 )); then
            echo "Nenhuma parte do pacote foi encontrada."
            exit 1
          fi

          echo "Partes recebidas (${#asset_parts[@]}):"
          for part in "${asset_parts[@]}"; do
            printf '  %s: ' "$part"
            wc -c < "$part"
          done

          cat "${asset_parts[@]}" > /tmp/management-v3-assets.b64
          actual_b64_size=$(wc -c < /tmp/management-v3-assets.b64 | tr -d ' ')
          actual_b64_sha=$(sha256sum /tmp/management-v3-assets.b64 | cut -d' ' -f1)
          echo "Base64: bytes=${actual_b64_size} sha256=${actual_b64_sha}"
          test "$actual_b64_size" = "29472"
          test "$actual_b64_sha" = "c839731c8df9db74c0e16cedcc6b86ed4fbea213ba9e931a863f6bc9e68b89b7"

          base64 --decode /tmp/management-v3-assets.b64 > /tmp/management-v3-assets.tar.gz
          actual_tar_size=$(wc -c < /tmp/management-v3-assets.tar.gz | tr -d ' ')
          actual_tar_sha=$(sha256sum /tmp/management-v3-assets.tar.gz | cut -d' ' -f1)
          echo "Tar gzip: bytes=${actual_tar_size} sha256=${actual_tar_sha}"
          test "$actual_tar_size" = "22103"
          test "$actual_tar_sha" = "e49c4d29e0dd8ec00cff0a514f59a666db072cfa262dca9d299b9fd9295ab3df"
          gzip --test /tmp/management-v3-assets.tar.gz
          tar -tzf /tmp/management-v3-assets.tar.gz | sed -n '1,80p'

          printf '%s\n' "${asset_parts[@]}" > /tmp/management-v3-parts.txt

      - name: Apply deterministic management visual implementation
        id: implementation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/management-v3-assets
          tar -xzf /tmp/management-v3-assets.tar.gz -C /tmp/management-v3-assets
          test -f /tmp/management-v3-assets/_management_v3/apply.mjs
          node /tmp/management-v3-assets/_management_v3/apply.mjs "$GITHUB_WORKSPACE"

          mapfile -t asset_parts < /tmp/management-v3-parts.txt
          git rm "${asset_parts[@]}"
          git add -A
          git status --short
          git diff --cached --stat
          git config user.name "mx-design-system-bot"
          git config user.email "mx-design-system-bot@users.noreply.github.com"
          git commit -m "refactor: remover legado visual dos perfis de gestão"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Run management design-system source contract
        run: node --test scripts/management-route-manifest.test.mjs scripts/audit-management-design-system.test.mjs

      - name: Write complete violation ledger
        if: always()
        shell: bash
        run: node scripts/audit-management-design-system.mjs > management-design-system-ledger.json || true

      - name: Build source snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          snapshot_paths=(src package.json package-lock.json vite.config.ts playwright.config.ts tsconfig.json)
          for optional in \
            tailwind.config.js \
            scripts/audit-management-design-system.mjs \
            scripts/audit-management-design-system.test.mjs \
            scripts/management-route-manifest.test.mjs; do
            [[ -e "$optional" ]] && snapshot_paths+=("$optional")
          done
          tar -czf management-source-snapshot.tar.gz "${snapshot_paths[@]}"

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-design-system-source-v3
          path: |
            management-source-snapshot.tar.gz
            management-design-system-ledger.json
          retention-days: 1
