name: Management Design System Audit V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  source-snapshot:
    name: Full management visual audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply atomic management visual implementation
        id: implementation
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          patch_parts=(scripts/management-v3-implementation.patch.gz.b64.part*)
          single_payload="scripts/management-v3-implementation.patch.gz.b64"

          if (( ${#patch_parts[@]} > 0 )); then
            cat "${patch_parts[@]}" > /tmp/management-v3.payload.b64
          elif [[ -f "$single_payload" ]]; then
            cp "$single_payload" /tmp/management-v3.payload.b64
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base64 --decode /tmp/management-v3.payload.b64 > /tmp/management-v3.patch.gz
          gzip --decompress --stdout /tmp/management-v3.patch.gz > /tmp/management-v3.patch
          git apply --check /tmp/management-v3.patch
          git apply --index --whitespace=fix /tmp/management-v3.patch

          if (( ${#patch_parts[@]} > 0 )); then
            git rm "${patch_parts[@]}"
          else
            git rm "$single_payload"
          fi

          git config user.name "mx-design-system-bot"
          git config user.email "mx-design-system-bot@users.noreply.github.com"
          git commit -m "refactor: remover legado visual dos perfis de gestão"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run management design-system source contract
        run: node --test scripts/management-route-manifest.test.mjs scripts/audit-management-design-system.test.mjs

      - name: Write complete violation ledger
        if: always()
        shell: bash
        run: node scripts/audit-management-design-system.mjs > management-design-system-ledger.json || true

      - name: Build source snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          tar -czf management-source-snapshot.tar.gz \
            src \
            scripts/audit-management-design-system.mjs \
            scripts/audit-management-design-system.test.mjs \
            scripts/management-route-manifest.test.mjs \
            package.json \
            package-lock.json \
            vite.config.ts \
            tailwind.config.js \
            playwright.config.ts \
            tsconfig.json \
            2>/dev/null || \
          tar -czf management-source-snapshot.tar.gz \
            src \
            scripts/audit-management-design-system.mjs \
            scripts/audit-management-design-system.test.mjs \
            scripts/management-route-manifest.test.mjs \
            package.json \
            package-lock.json \
            vite.config.ts \
            playwright.config.ts \
            tsconfig.json

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-design-system-source-v3
          path: |
            management-source-snapshot.tar.gz
            management-design-system-ledger.json
          retention-days: 1
