name: Management Design System Audit V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    name: Full management visual audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inspect focused visual isolation fix
        id: followup
        shell: bash
        run: |
          set -u
          payload="scripts/management-v3-followup.patch.gz.b64"
          report="management-v3-followup-integrity.txt"
          : > "$report"

          if [[ ! -f "$payload" ]]; then
            echo "present=false" | tee -a "$report"
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "present=true" | tee -a "$report"
          echo "present=true" >> "$GITHUB_OUTPUT"
          size=$(wc -c < "$payload" | tr -d ' ')
          sha=$(sha256sum "$payload" | cut -d' ' -f1)
          echo "base64 bytes=$size sha256=$sha" | tee -a "$report"
          echo "expected_base64 bytes=10300 sha256=a55c3861cbf71f2d23b5d79294f8e127624767234372d384c35cde673ccbf664" | tee -a "$report"

          valid=true
          [[ "$size" = "10300" ]] || valid=false
          [[ "$sha" = "a55c3861cbf71f2d23b5d79294f8e127624767234372d384c35cde673ccbf664" ]] || valid=false

          if base64 --decode "$payload" > /tmp/management-v3-followup.patch.gz 2>> "$report"; then
            gzip_sha=$(sha256sum /tmp/management-v3-followup.patch.gz | cut -d' ' -f1)
            echo "gzip sha256=$gzip_sha" | tee -a "$report"
            echo "expected_gzip sha256=2b6036d205dcc05f405ecfb2bbb80886f82f6e53fc2cf8244cae2a32bacfb82a" | tee -a "$report"
            [[ "$gzip_sha" = "2b6036d205dcc05f405ecfb2bbb80886f82f6e53fc2cf8244cae2a32bacfb82a" ]] || valid=false
            gzip --test /tmp/management-v3-followup.patch.gz 2>> "$report" || valid=false
            gzip --decompress --stdout /tmp/management-v3-followup.patch.gz > /tmp/management-v3-followup.patch
            if git apply --check /tmp/management-v3-followup.patch >> "$report" 2>&1; then
              echo "git_apply_check=pass" | tee -a "$report"
            else
              echo "git_apply_check=fail" | tee -a "$report"
              valid=false
            fi
          else
            valid=false
          fi

          echo "valid=$valid" | tee -a "$report"
          echo "valid=$valid" >> "$GITHUB_OUTPUT"

      - name: Apply focused visual isolation fix
        if: steps.followup.outputs.present == 'true' && steps.followup.outputs.valid == 'true'
        shell: bash
        run: |
          set -euo pipefail
          payload="scripts/management-v3-followup.patch.gz.b64"
          git apply --index --whitespace=fix /tmp/management-v3-followup.patch
          git rm "$payload"
          rm -f management-v3-followup-integrity.txt
          git add -A
          git config user.name "mx-design-system-bot"
          git config user.email "mx-design-system-bot@users.noreply.github.com"
          git commit -m "fix: isolar componentes compartilhados por contexto visual"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Run management design-system contracts
        if: steps.followup.outputs.valid == 'true'
        run: node --test scripts/management-route-manifest.test.mjs scripts/audit-management-design-system.test.mjs

      - name: Write complete violation ledger
        if: always()
        run: node scripts/audit-management-design-system.mjs > management-design-system-ledger.json || true

      - name: Build source snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          snapshot_paths=(src package.json package-lock.json vite.config.ts playwright.config.ts tsconfig.json)
          for optional in \
            tailwind.config.js \
            scripts/audit-management-design-system.mjs \
            scripts/audit-management-design-system.test.mjs \
            scripts/management-route-manifest.test.mjs; do
            [[ -e "$optional" ]] && snapshot_paths+=("$optional")
          done
          tar -czf management-source-snapshot.tar.gz "${snapshot_paths[@]}"

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-design-system-source-v3
          path: |
            management-source-snapshot.tar.gz
            management-design-system-ledger.json
            management-v3-followup-integrity.txt
          retention-days: 1

      - name: Fail when focused fix is invalid
        if: always() && steps.followup.outputs.present == 'true' && steps.followup.outputs.valid != 'true'
        run: |
          cat management-v3-followup-integrity.txt
          exit 1
