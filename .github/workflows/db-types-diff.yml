name: db-types-diff

# Story 0.1 / DB-014 — CI gate: bloqueia PRs que alterem schema sem regenerar
# src/types/database.generated.ts via `npm run gen:db-types`.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'src/types/database.generated.ts'
      - '.github/workflows/db-types-diff.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  diff:
    name: Verificar drift de database.generated.ts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Cache Supabase CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/supabase
          key: supabase-cli-${{ runner.os }}-2.75.0

      - name: Gerar types do projeto linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Secrets SUPABASE_ACCESS_TOKEN e SUPABASE_PROJECT_ID nao configurados."
            echo "Configure em Settings > Secrets and variables > Actions."
            exit 1
          fi
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_ID" \
            --schema public \
            | grep -v '^Initialising login role' \
            | grep -v '^A new version of Supabase CLI' \
            | grep -v '^We recommend updating regularly' \
            > /tmp/db_remote.ts

      - name: Comparar com arquivo commitado
        run: |
          # Strip header banner do arquivo commitado (4 linhas de comentario + linha em branco)
          tail -n +6 src/types/database.generated.ts > /tmp/db_local.ts
          if ! diff -u /tmp/db_local.ts /tmp/db_remote.ts > /tmp/diff.patch; then
            echo "::error::Drift detectado em src/types/database.generated.ts"
            echo "::error::Rode 'npm run gen:db-types' localmente e commite o resultado."
            echo "--- Diff (primeiras 100 linhas) ---"
            head -100 /tmp/diff.patch
            exit 1
          fi
          echo "OK: database.generated.ts esta sincronizado com o schema remoto."
