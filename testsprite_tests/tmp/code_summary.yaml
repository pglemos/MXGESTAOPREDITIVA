version: "2"
type: backend
tech_stack:
  - postgresql
  - supabase
  - typescript
features:
  - name: Auth Login
    description: Sign in with email and password
    files: []
    endpoints:
      - method: POST
        path: /auth/v1/token?grant_type=password
        description: Sign in
        auth_required: false
  - name: Auth User
    description: Get authenticated user details
    files: []
    endpoints:
      - method: GET
        path: /auth/v1/user
        description: User details
        auth_required: true
  - name: Stores List
    description: List available stores
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/stores
        description: List stores
        auth_required: true
  - name: Store Create
    description: Create a new store
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/stores
        description: Create store
        auth_required: true
  - name: Store Update
    description: Update store details
    files: []
    endpoints:
      - method: PATCH
        path: /rest/v1/stores
        description: Update store
        auth_required: true
  - name: Checkin List
    description: List daily check-ins
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/daily_checkins
        description: List checkins
        auth_required: true
  - name: Checkin Create
    description: Record a new daily check-in
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/daily_checkins
        description: Create checkin
        auth_required: true
  - name: Checkin Delete
    description: Delete a check-in
    files: []
    endpoints:
      - method: DELETE
        path: /rest/v1/daily_checkins
        description: Delete checkin
        auth_required: true
  - name: Feedback List
    description: List performance feedbacks
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/feedbacks
        description: List feedbacks
        auth_required: true
  - name: Feedback Create
    description: Create a new feedback
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/feedbacks
        description: Create feedback
        auth_required: true
  - name: PDI List
    description: List performance development plans
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/pdis
        description: List PDIs
        auth_required: true
  - name: PDI Create
    description: Create a new PDI
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/pdis
        description: Create PDI
        auth_required: true
  - name: Training Progress List
    description: List user training progress
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/training_progress
        description: List progress
        auth_required: true
  - name: Training Progress Create
    description: Update user training progress
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/training_progress
        description: Record progress
        auth_required: true
  - name: Notifications List
    description: List system notifications
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/notifications
        description: List notifications
        auth_required: true
  - name: Notification Read
    description: Mark notification as read
    files: []
    endpoints:
      - method: POST
        path: /rest/v1/notification_reads
        description: Mark as read
        auth_required: true
  - name: Memberships List
    description: List user store memberships
    files: []
    endpoints:
      - method: GET
        path: /rest/v1/memberships
        description: List memberships
        auth_required: true
  - name: Reprocessing Jobs List
    description: List administrative reprocessing jobs
