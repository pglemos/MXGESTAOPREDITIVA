# ===============================================================================
# TEMPLATE: Longform Cut v1.0
# Purpose: Final cut file for 10+ min video content
# Generated by: mrbeast
# Input: narrative_structure.yaml + curadoria.yaml (optional)
# Output: longform_cut.yaml
# Used in: wf-longform-pipeline.yaml (Phase 2)
# ===============================================================================

# LONGFORM CUT
# Complete editor-ready cut file with chapters, retention hooks, energy map
# All timestamps are EXACT — editor cuts directly from this file

# ===============================================================================
# METADATA
# ===============================================================================

metadata:
  titulo: "{TITULO_DO_VIDEO}"
  fonte_original: "{URL_OU_NOME_DO_VIDEO}"
  duracao_original: "{HH:MM:SS}"
  duracao_final_estimada: "{MM:SS}"
  formato: "longform"
  plataforma: "{youtube_main | podcast_video | course}"
  narrative_style: "{blind-assembly | rule-of-six | 5-second}"
  style_preset: "educational_longform"  # educational_longform | emotional_longform
  architect: "{agent_name}"
  data_geracao: "{YYYY-MM-DD}"
  gerado_por: "curator squad v2.4"
  source_file: "output/curated/{source-slug}/momentos.md"
  transcricao_anotada_file: "output/curated/{source-slug}/transcricao_anotada.md"
  narrative_file: "narrative_structure.yaml"
  curadoria_file: "curadoria.yaml"  # null if not enriched
  variant_id: "v1"          # v1, v2, v3... (v1 = primary variant)
  variant_rationale: ""     # What makes this variant different from others (empty if single variant)

# ===============================================================================
# DURATION INTELLIGENCE (content-driven, NOT fixed buckets)
# Ref: .dispatch/research/curator-cut-customization-research.md (Section 3)
# ===============================================================================

duration_intelligence:
  recommended_duration: "{MM:SS}"  # Calculated from content structure
  duration_breakdown:
    chapters_total_s: 0     # Sum of all selected moment durations
    transitions_s: 0        # N transitions x 2-5s each
    intro_s: 0              # 10-30s intro time
    outro_s: 0              # 15-30s outro time
  chapter_breakdown: |
    # Chapter 1 (Hook+Context): XXs
    # Chapter 2 (Body A): Xm XXs
    # Chapter 3 (Body B): Xm XXs
    # Chapter 4 (Climax): Xm XXs
    # Chapter 5 (Close): Xm XXs
    # Transitions: N x ~Xs = XXs
    # Total: Xm XXs
  platform_reference:
    # Longform platform guidelines:
    #   YouTube main: 10-20m optimal | max: varies
    #   Podcast video: 20-60m typical | max: varies
    #   Course: 5-15m per lesson | max: varies
    platform: "{youtube_main | podcast_video | course}"
    optimal_range: ""       # e.g. "10-20m" for YouTube main
  confidence: "HIGH | MODERATE"
  confidence_note: ""       # e.g. "Within optimal range for YouTube" or "5m over typical length"

# ===============================================================================
# CHAPTER STRUCTURE
# ===============================================================================

# YouTube-compatible chapters (for description + progress bar)
# Each chapter is a self-contained section with internal arc

chapters:
  - chapter: 1
    title: "{CHAPTER_TITLE}"
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_estimada: "{MM:SS}"
    purpose: "Hook + context setup"

    # Moments in assembly order (NOT chronological)
    momentos:
      - id: 0  # Moment ID from {source-slug}/momentos.md
        ordem_montagem: 1
        tipo: "hook"
        timestamp_inicio: "00:00:00"
        timestamp_fim: "00:00:00"
        duracao_segundos: 0
        role: "cold_open"
        corte_natural_in: "00:00:00"   # From transcricao_anotada — natural cut-in point
        corte_natural_out: "00:00:00"  # From transcricao_anotada — natural cut-out point
        bridge_antes: null             # BRIDGE text before this moment (null if REMOVE)
        bridge_depois: null            # BRIDGE text after this moment (null if REMOVE)
        transcricao: |
          Transcription from banco_momentos (word for word)
        notas_editor: |
          - Specific editor instructions for this moment
          - Cut points, zoom, audio notes
        transicao_depois: "natural"

      # Additional moments in this chapter...

    # Retention hook at end of chapter (prevents drop-off)
    retention_hook:
      type: "teaser"  # teaser | question | pattern_interrupt | visual_cue
      text: "What the narrator teases about next chapter"
      timestamp: "00:00:00"

  - chapter: 2
    title: "{CHAPTER_TITLE}"
    # ... same structure as chapter 1

# ===============================================================================
# COLD OPEN
# ===============================================================================

# The strongest moment placed at the very beginning (before intro)
cold_open:
  moment_id: 0
  timestamp_inicio: "00:00:00"
  timestamp_fim: "00:00:00"
  duracao_segundos: 0
  selection_criteria: |
    Why this moment was chosen as cold open:
    - Highest hook score in banco_momentos
    - Creates immediate curiosity
    - Works without context (standalone clarity)
  transcricao: |
    Exact text of the cold open moment

# ===============================================================================
# YOUTUBE METADATA
# ===============================================================================

youtube:
  titulo_sugerido: "{VIDEO_TITLE} — max 60 chars"
  descricao:
    chapters: |
      00:00 {Chapter 1 title}
      02:15 {Chapter 2 title}
      05:30 {Chapter 3 title}
    links: |
      Relevant links mentioned in content
    cta: |
      Subscribe, comment, share prompt

  tags:
    - "{tag1}"
    - "{tag2}"
    - "{tag3}"

  thumbnail_suggestion:
    text: "1-3 words for thumbnail text"
    emotion: "curiosity | shock | intrigue"
    moment_reference: 0  # Moment ID with best visual for thumbnail

# ===============================================================================
# EDITOR INSTRUCTIONS
# ===============================================================================

instrucoes_editor:
  gerais:
    - "Timestamps are EXACT — cut directly at indicated points"
    - "Assembly order is NOT chronological — follow ordem_montagem"
    - "Cut silences > 2 seconds unless marked as intentional pause"
    - "Maintain energy consistency in first 30 seconds"

  sobre_transicoes:
    - "natural: flow without visible cut"
    - "hard_cut: visible cut (energy shift)"
    - "pausa_intencional: add 2-3s breathing room"
    - "bridge: use indicated bridge phrase"

  sobre_audio:
    - "Keep original audio"
    - "Background music ONLY where indicated"
    - "No sound effects unless specified"

  sobre_visual:
    - "Close-up on cold open"
    - "Cut every 3-5 seconds for energy"
    - "Subtle zoom on insight moments"
    - "Text overlays for data/stats from curadoria"

# ===============================================================================
# SUMMARY
# ===============================================================================

sumario:
  total_chapters: 0
  total_momentos: 0
  duracao_final_estimada: "{MM:SS}"
  momentos_por_tipo:
    hook: 0
    story: 0
    insight: 0
    quote: 0
  cold_open_score: 0

