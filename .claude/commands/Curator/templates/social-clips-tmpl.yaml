# ===============================================================================
# TEMPLATE: Social Clips v1.0
# Purpose: Platform-optimized social media clips from mined moments
# Generated by: brendan-kane (Hook Point) + jonah-berger (STEPPS)
# Input: {source-slug}/momentos.md
# Output: social_clips.yaml
# Used in: wf-multi-format.yaml (Track C)
# ===============================================================================

# SOCIAL CLIPS
# Top shareable moments optimized per platform
# Each clip is a standalone piece — not a cut from a longer video
# Selection based on STEPPS framework (virality) + Hook Point (capture)

# ===============================================================================
# METADATA
# ===============================================================================

metadata:
  fonte_original: "{URL_OU_NOME_DO_VIDEO}"
  source_file: "output/curated/{source-slug}/momentos.md"
  total_clips: 0
  plataformas: ["linkedin", "instagram_feed", "twitter", "threads"]
  data_geracao: "{YYYY-MM-DD}"
  gerado_por: "curator squad v2.4"
  frameworks_applied:
    - "STEPPS (Jonah Berger) — Virality scoring"
    - "Hook Point (Brendan Kane) — Attention capture"

# ===============================================================================
# STEPPS ANALYSIS (Jonah Berger)
# ===============================================================================

# Applied to ALL moments in banco, top 5 selected for clips
stepps_analysis:
  methodology: |
    Each moment scored on 6 STEPPS dimensions (0-10 each):
    S = Social Currency (makes sharer look smart/in-the-know)
    T = Triggers (associated with frequent environmental cues)
    E = Emotion (high-arousal: awe, anxiety, anger, humor)
    P = Public (visible behavior that others can imitate)
    P = Practical Value (useful, saves time/money/effort)
    S = Stories (embedded in a narrative people want to retell)

  top_moments:
    - moment_id: 0
      stepps_score: 0  # Sum of 6 dimensions (max 60)
      stepps_breakdown:
        social_currency: 0
        triggers: 0
        emotion: 0
        public: 0
        practical_value: 0
        stories: 0
      why_shareable: "Reason this moment will be shared"
      primary_driver: "emotion"  # Which STEPPS dimension dominates

    # Repeat for top 5 moments

# ===============================================================================
# CLIPS
# ===============================================================================

clips:

  - clip_id: 1
    moment_id: 0  # From {source-slug}/momentos.md
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_segundos: 0

    # Content
    transcricao: |
      Exact transcription from banco_momentos
    assunto: "{TOPIC}"
    tipo: "insight"  # hook | insight | story | quote
    gatilho_viral: "especifico"

    # Scoring
    impact_score: 0
    stepps_score: 0
    hook_point_score: 0
    combined_virality: 0  # Weighted: impact×0.4 + stepps×0.3 + hook×0.3

    # Platform-specific adaptations
    adaptations:

      linkedin:
        format: "text_post"  # text_post | carousel | video_clip | document
        hook_line: |
          First line that appears before "...see more"
          Must create curiosity in <15 words
        body: |
          Full post text in pt-BR.
          Uses Alan's voice and style.
          Includes the insight/moment reframed for LinkedIn audience.
          Ends with engagement question.
        hashtags: ["#tag1", "#tag2", "#tag3"]
        cta: "Engagement question or call to comment"
        best_posting_time: "Tuesday-Thursday, 8-10am"
        estimated_reach: "medium-high"  # based on content type match

      instagram_feed:
        format: "carousel"  # carousel | static | video_clip
        slides:
          - slide: 1
            type: "hook"
            text: "Attention-grabbing first slide"
            visual: "Bold text on brand background"
          - slide: 2
            type: "context"
            text: "Sets up the insight"
          - slide: 3
            type: "value"
            text: "The core insight"
          - slide: 4
            type: "cta"
            text: "Save + Share CTA"
        caption: |
          PT-BR caption for Instagram.
          Conversational, emoji-light.
          Includes relevant hashtags.
        hashtags: ["#tag1", "#tag2", "#tag3"]

      twitter:
        format: "thread"  # single_tweet | thread | quote_tweet
        tweets:
          - tweet: 1
            text: |
              Hook tweet — max 280 chars.
              Must work standalone.
          - tweet: 2
            text: |
              Context/insight — max 280 chars.
          - tweet: 3
            text: |
              CTA or engagement prompt.
        notes: "Threads with 3-5 tweets perform best"

      threads:
        format: "single_post"  # single_post | thread
        text: |
          Threads post — conversational, raw, authentic.
          500 char limit per post.
        notes: "Threads favors authentic, less polished content"

  # Additional clips follow same structure...

# ===============================================================================
# CONTENT CALENDAR SUGGESTION
# ===============================================================================

content_calendar:
  strategy: |
    Stagger clips across platforms over 5-7 days.
    LinkedIn and Twitter first (professional), Instagram second (visual),
    Threads last (casual).

  schedule:
    - day: 1
      platform: "linkedin"
      clip_id: 1
      rationale: "Highest practical value — LinkedIn audience"
    - day: 2
      platform: "twitter"
      clip_id: 2
      rationale: "Most provocative — Twitter thrives on debate"
    - day: 3
      platform: "instagram_feed"
      clip_id: 3
      rationale: "Best visual potential"
    - day: 4
      platform: "threads"
      clip_id: 4
      rationale: "Conversational insight"
    - day: 5
      platform: "linkedin"
      clip_id: 5
      rationale: "Follow-up to day 1"

# ===============================================================================
# MOMENT USAGE MAP
# ===============================================================================

# Prevents duplicate usage across multi-format pipeline
moment_usage:
  - moment_id: 0
    used_in: ["social_clip_1"]
    also_in: ["shorts_cut"]  # If used in other formats, note here
    framing: "Different angle than shorts version"

# ===============================================================================
# SUMMARY
# ===============================================================================

sumario:
  total_clips: 0
  platforms_covered: 0
  avg_stepps_score: 0
  avg_hook_point_score: 0
  momentos_usados: []
  content_pieces_generated: 0  # Total adaptations across platforms

# ===============================================================================
# QUALITY CHECKLIST
# ===============================================================================

quality_checklist:
  - "[ ] STEPPS analysis completed for all candidate moments"
  - "[ ] Top 5 moments selected with virality scores"
  - "[ ] Each clip has platform-specific adaptation"
  - "[ ] LinkedIn posts follow professional tone"
  - "[ ] Instagram carousels have clear visual hierarchy"
  - "[ ] Twitter threads are within character limits"
  - "[ ] Content calendar distributes across 5-7 days"
  - "[ ] No moment duplicated identically across formats"
  - "[ ] All transcriptions are exact from banco_momentos"
  - "[ ] Engagement hooks present in every platform adaptation"
