# ===============================================================================
# TEMPLATE: Longform Simple Cut v1.0
# Purpose: Chronological cut file for 20-25 min content with engineered opening
# Generated by: mrbeast (light mode — no full Tier 1 narrative restructuring)
# Input: transcricao_anotada.md (REQUIRED) + momentos.md
# Output: longform_simple_cut.yaml
# Used in: wf-longform-simple-pipeline.yaml
# ===============================================================================

# LONGFORM SIMPLE CUT
# Chronological editor-ready cut file with engineered opening, window selection,
# and point insertions. Preserves conversation order — no narrative reordering.
# Golden rule: First 2 minutes VERY good. After that, flows naturally.

# ===============================================================================
# METADATA
# ===============================================================================

metadata:
  titulo: "{TITULO_DO_VIDEO}"
  fonte_original: "{URL_OU_NOME_DO_VIDEO}"
  duracao_original: "{HH:MM:SS}"
  duracao_final_estimada: "{MM:SS}"
  formato: "longform_simple"
  plataforma: "{youtube_main | podcast_video | course}"
  style_preset: "conversational"
  architect: "{agent_name}"
  data_geracao: "{YYYY-MM-DD}"
  gerado_por: "curator squad v3.0"
  source_file: "output/curated/{source-slug}/momentos.md"
  transcricao_anotada_file: "output/curated/{source-slug}/transcricao_anotada.md"
  curadoria_file: "curadoria.yaml"  # null if not enriched

# ===============================================================================
# DURATION INTELLIGENCE (content-driven — adapted for simple format)
# ===============================================================================

duration_intelligence:
  recommended_duration: "{MM:SS}"  # Target: 20-25 min
  duration_breakdown:
    abertura_engenheirada_s: 0    # First ~120s: hook + dense opening moments
    janela_limpa_s: 0             # Window content after REMOVE cleanup
    insercoes_fora_janela_s: 0    # 2-3 point insertions from outside window
  source_window:
    raw_duration_s: 0             # ~30-35 min of raw source (pre-cleanup)
    cleanup_ratio: 0.0            # Ratio of KEEP+BRIDGE to total window
  formula: "abertura + janela_limpa + insercoes = recommended_duration"
  platform_reference:
    platform: "{youtube_main | podcast_video | course}"
    optimal_range: "20-25m"
  confidence: "HIGH | MODERATE"
  confidence_note: ""

# ===============================================================================
# JANELA TEMPORAL (replaces chapters — single continuous window)
# ===============================================================================

# The window is a continuous segment from the source selected by KEEP density.
# Everything inside the window follows chronological order.

janela_temporal:
  inicio: "HH:MM:SS"             # Window start timestamp in original source
  fim: "HH:MM:SS"                # Window end timestamp in original source
  duracao_bruta: "{MM:SS}"        # Raw duration before cleanup (~30-35 min)
  duracao_limpa: "{MM:SS}"        # Duration after REMOVE segments cut (~20-25 min)
  tema_central: ""                # Central theme/topic of the selected window
  densidade_keep: 0.0             # Ratio of KEEP segments within window (0-1)
  selection_rationale: |
    Why this window was selected:
    - Highest KEEP density in source
    - Strong thematic coherence
    - Natural conversation flow

# ===============================================================================
# ABERTURA ENGENHEIRADA (replaces cold_open — engineered first 2 minutes)
# ===============================================================================

# First ~120s are engineered for maximum retention.
# Hook can come from ANYWHERE in the source (not just within window).
# After hook, 2-3 dense moments establish value before natural flow begins.

abertura_engenheirada:
  duracao_alvo_s: 120             # Target: ~2 minutes
  hook:
    moment_id: 0                  # From momentos.md — can be from anywhere in source
    timestamp_inicio: "HH:MM:SS"
    timestamp_fim: "HH:MM:SS"
    duracao_segundos: 0
    fora_janela: true             # Hook is typically from outside the window
    selection_criteria: |
      Why this moment was chosen as hook:
      - Highest hook/impact score in momentos.md
      - Creates immediate curiosity
      - Works without context (standalone clarity)
    transcricao: |
      Exact text of the hook moment

  momentos_abertura:              # 2-3 dense moments after hook, before natural flow
    - id: 0
      timestamp_inicio: "HH:MM:SS"
      timestamp_fim: "HH:MM:SS"
      duracao_segundos: 0
      fora_janela: false           # Can be from window start or outside
      insercao_motivo: ""          # Only if fora_janela: true
      segmento_anotado: "KEEP"
      transcricao: |
        Exact transcription of opening moment
      notas_editor: |
        Editor instructions for this opening moment

# ===============================================================================
# MOMENTOS (chronological order within window + point insertions)
# ===============================================================================

# Moments are in CHRONOLOGICAL order (unlike longform professional which reorders).
# Each moment maps to a KEEP segment from transcricao_anotada.
# Gaps between moments are handled by gap_antes field.

momentos:
  - id: 0                        # Moment ID from momentos.md
    ordem_cronologica: 1          # Sequential position in chronological flow
    tipo: "{hook|insight|story|data|quote}"
    timestamp_inicio: "HH:MM:SS"
    timestamp_fim: "HH:MM:SS"
    duracao_segundos: 0
    fora_janela: false            # true = point insertion from outside window
    insercao_motivo: ""           # REQUIRED if fora_janela: true. Why this was inserted.
    segmento_anotado: "KEEP"      # KEEP or BRIDGE (from transcricao_anotada)
    corte_natural_in: "HH:MM:SS"  # From transcricao_anotada — natural cut-in point
    corte_natural_out: "HH:MM:SS" # From transcricao_anotada — natural cut-out point
    gap_antes:
      tipo: "REMOVE | BRIDGE | none"
      duracao_segundos: 0         # Duration of gap in original source
      acao_editor: "jump_cut | keep_bridge | none"
      bridge_text: ""             # Only if tipo == BRIDGE: the bridge text to keep
    transcricao: |
      Exact transcription from momentos.md (word for word)
    notas_editor: |
      Specific editor instructions for this moment
    transicao_depois: "natural | jump_cut"  # Simple transitions only

  # Additional moments in chronological order...
  # Point insertions (fora_janela: true) placed where they fit thematically

# ===============================================================================
# EDITOR INSTRUCTIONS
# ===============================================================================

instrucoes_editor:
  gerais:
    - "Timestamps are EXACT — cut directly at indicated points"
    - "Moments are in CHRONOLOGICAL order — do NOT reorder"
    - "First 2 minutes are engineered (hook + dense opening) — these MAY be non-chronological"
    - "After opening, flow follows natural conversation order"
    - "Cut silences > 2 seconds unless marked as intentional pause"

  sobre_gaps:
    - "gap_antes.tipo == REMOVE: Jump cut (remove the gap entirely)"
    - "gap_antes.tipo == BRIDGE: Keep the bridge text as spoken connector"
    - "gap_antes.tipo == none: Moments are adjacent, no gap"

  sobre_insercoes:
    - "Moments with fora_janela: true are point insertions from outside the main window"
    - "Each insertion has insercao_motivo explaining why it was placed there"
    - "Use hard cut or brief transition to/from insertions"
    - "Maximum 2-3 insertions to maintain natural flow"

  sobre_audio:
    - "Keep original audio throughout"
    - "Background music ONLY during opening hook (first 10-15s)"
    - "No sound effects unless specified"
    - "Natural conversation audio — no aggressive editing"

  sobre_visual:
    - "Close-up on hook moment"
    - "Standard framing for conversation flow (no aggressive zooms)"
    - "Subtle zoom on key insight moments only"
    - "Text overlay ONLY for data/stats if curadoria available"

# ===============================================================================
# SUMMARY
# ===============================================================================

sumario:
  total_momentos: 0
  momentos_janela: 0              # Moments from within the selected window
  insercoes_fora_janela: 0        # Point insertions (max 2-3)
  gaps_removidos: 0               # REMOVE gaps (jump cuts)
  gaps_bridge: 0                  # BRIDGE gaps (kept as connectors)
  duracao_final_estimada: "{MM:SS}"
  janela_temporal:
    inicio: "HH:MM:SS"
    fim: "HH:MM:SS"
    tema: ""
  abertura:
    hook_moment_id: 0
    momentos_abertura_count: 0
    duracao_abertura_s: 0
