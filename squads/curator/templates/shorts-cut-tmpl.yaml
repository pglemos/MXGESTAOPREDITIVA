# ===============================================================================
# TEMPLATE: Shorts Cut v1.0
# Purpose: Final cut file for sub-60-second content
# Generated by: mrbeast (with brendan-kane hook optimization)
# Input: {source-slug}/momentos.md + hook_selection.yaml
# Output: shorts_cut.yaml
# Used in: wf-shorts-pipeline.yaml (Phase 2), wf-multi-format.yaml (Track A)
# ===============================================================================

# SHORTS CUT
# 5-beat structure optimized for vertical short-form platforms
# All timestamps are EXACT — editor cuts directly from this file

# ===============================================================================
# METADATA
# ===============================================================================

metadata:
  titulo: "{TITULO_DO_SHORT}"
  fonte_original: "{URL_OU_NOME_DO_VIDEO}"
  duracao_original: "{HH:MM:SS}"
  formato: "shorts"
  plataforma: "{tiktok | reels | youtube_shorts}"
  data_geracao: "{YYYY-MM-DD}"
  gerado_por: "curator squad v2.4"
  source_file: "output/curated/{source-slug}/momentos.md"
  transcricao_anotada_file: "output/curated/{source-slug}/transcricao_anotada.md"
  hook_source: "hook_selection.yaml"
  style_preset: "viral"  # viral | educational | emotional | entertaining
  variant_id: "v1"          # v1, v2, v3... (v1 = primary variant)
  variant_rationale: ""     # What makes this variant different from others (empty if single variant)

# ===============================================================================
# DURATION INTELLIGENCE (content-driven, NOT fixed buckets)
# Ref: .dispatch/research/curator-cut-customization-research.md (Section 3)
# ===============================================================================

duration_intelligence:
  recommended_duration: 0  # Calculated from content structure (sum of beat durations)
  duration_breakdown:
    hook_s: 0       # Beat 1: pattern interrupt (1-7s depending on hook type)
    context_s: 0    # Beat 2: frame the value (3-8s)
    value_s: 0      # Beat 3: core content (10-40s depending on content)
    payoff_s: 0     # Beat 4: reward for watching (2-7s)
    cta_s: 0        # Beat 5: loop/CTA (1-3s)
  platform_sweet_spot:
    # Platform-specific optimal ranges (from 2026 data):
    #   TikTok viral: 24-38s | value: 60-90s | max: 60s
    #   Instagram Reels viral: 7-15s | value: 30-45s | max: 90s
    #   YouTube Shorts optimal: 50-58s | max: 60s
    #   LinkedIn: 60-90s | max: 10m
    #   Twitter/X: 20-45s | max: 140s
    platform: "{tiktok | reels | youtube_shorts}"
    sweet_spot_min: 0   # Lower bound of platform sweet spot
    sweet_spot_max: 0   # Upper bound of platform sweet spot
    hard_limit: 0       # Platform maximum duration
  confidence: "HIGH | MODERATE"  # HIGH = within sweet spot, MODERATE = outside sweet spot
  confidence_note: ""  # e.g. "4s over sweet spot ceiling" or "in viral sweet spot"
  tolerance_s: 5       # +/-5s acceptable deviation

# ===============================================================================
# HOOK ANALYSIS (from brendan-kane)
# ===============================================================================

hook_analysis:
  selected_hook:
    moment_id: 0  # ID from {source-slug}/momentos.md
    impact_score: 0
    hook_type: "counter-intuitive"  # counter-intuitive | question | shock-stat | visual | story
    one_second_capture: |
      The first 1 second — what grabs attention visually and/or verbally
    first_three_seconds: |
      The first 3 seconds — what creates the "I need to watch this" feeling
    hook_point_score: 0  # 1-10 (Brendan Kane methodology)

  rejected_hooks:
    - moment_id: 0
      reason: "Why this hook was not selected"
    - moment_id: 0
      reason: "Why this hook was not selected"

# ===============================================================================
# 5-BEAT STRUCTURE
# ===============================================================================

# Shorts follow a strict 5-beat structure.
# Beat durations are CONTENT-DRIVEN (from Duration Intelligence), not fixed.
# The percentages below are approximate guides — actual seconds come from
# duration_intelligence.duration_breakdown.
#
#   Beat 1: HOOK (~5-10% of total) — capture or lose
#   Beat 2: CONTEXT (~10-15% of total) — why should I care
#   Beat 3: VALUE (~50-60% of total) — the meat
#   Beat 4: PAYOFF (~15-20% of total) — the reward for watching
#   Beat 5: LOOP/CTA (~5% of total) — rewatch or action

beats:
  - beat: 1
    name: "HOOK"
    target_duration: "~5-10% of total (from duration_intelligence.hook_s)"
    moment_id: 0
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_segundos: 0
    corte_natural_in: "00:00:00"   # From transcricao_anotada — natural cut-in
    corte_natural_out: "00:00:00"  # From transcricao_anotada — natural cut-out
    transcricao: |
      Exact words spoken in the hook
    notas_editor: |
      - FIRST FRAME must be visually compelling
      - Text overlay: "{HOOK_TEXT}" (large, centered)
      - No intro, no logo, no buildup — straight to hook
      - Cut frequency: every 1-2 seconds

  - beat: 2
    name: "CONTEXT"
    target_duration: "~10-15% of total (from duration_intelligence.context_s)"
    moment_id: 0
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_segundos: 0
    corte_natural_in: "00:00:00"
    corte_natural_out: "00:00:00"
    transcricao: |
      Context that frames the value
    notas_editor: |
      - Establish the "why this matters"
      - Can be a different moment or continuation of hook
      - Text overlay: key phrase or question

  - beat: 3
    name: "VALUE"
    target_duration: "~50-60% of total (from duration_intelligence.value_s)"
    moment_id: 0
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_segundos: 0
    corte_natural_in: "00:00:00"
    corte_natural_out: "00:00:00"
    transcricao: |
      The core value — insight, story, or revelation
    notas_editor: |
      - This is the meat — DO NOT rush
      - Cut frequency: every 2-4 seconds
      - Zoom on key phrases
      - Text overlay for data/stats if applicable

  - beat: 4
    name: "PAYOFF"
    target_duration: "~15-20% of total (from duration_intelligence.payoff_s)"
    moment_id: 0
    timestamp_inicio: "00:00:00"
    timestamp_fim: "00:00:00"
    duracao_segundos: 0
    corte_natural_in: "00:00:00"
    corte_natural_out: "00:00:00"
    transcricao: |
      The reward — punchline, conclusion, surprise
    notas_editor: |
      - Deliver on the hook's promise
      - Energy should peak here
      - Pause 0.5-1s after payoff for impact

  - beat: 5
    name: "LOOP/CTA"
    target_duration: "~5% of total (from duration_intelligence.cta_s)"
    type: "loop"  # loop | cta | both
    moment_id: null  # null if using constructed ending
    transcricao: |
      Loop text or CTA text
    notas_editor: |
      - LOOP: Last frame connects visually to first frame (drives replays)
      - CTA: "Follow for more" or "Comment below"
      - Text overlay: CTA text
      - Keep under 3 seconds

# ===============================================================================
# TEXT OVERLAY PLAN
# ===============================================================================

text_overlays:
  - at_second: 0
    text: "{HOOK_TEXT}"
    style: "large_centered"  # large_centered | subtitle | corner_tag
    duration: 3
  - at_second: 8
    text: "{KEY_INSIGHT}"
    style: "subtitle"
    duration: 5
  # Add as needed based on content

# ===============================================================================
# PLATFORM ADAPTATIONS
# ===============================================================================

platform_adaptations:
  tiktok:
    max_duration: 60
    viral_sweet_spot: "24-38s"
    value_sweet_spot: "60-90s"
    aspect_ratio: "9:16"
    safe_zone: "Top 15% (username), Bottom 20% (controls)"
    trending_sound: null  # Suggest if applicable
    hashtags:
      - "#{tag1}"
      - "#{tag2}"
      - "#{tag3}"
    notes: "Loop endings perform 2-3x on TikTok"

  instagram_reels:
    max_duration: 90
    viral_sweet_spot: "7-15s"
    value_sweet_spot: "30-45s"
    aspect_ratio: "9:16"
    safe_zone: "Bottom 25% (UI elements)"
    cover_frame: "Suggest best frame for grid thumbnail"
    caption: "{PT-BR caption, max 2200 chars}"
    notes: "Strong visual hook critical — Instagram is visual-first"

  youtube_shorts:
    max_duration: 60
    optimal_sweet_spot: "50-58s"
    aspect_ratio: "9:16"
    safe_zone: "Standard"
    title: "{TITULO} #Shorts"
    notes: "Can leverage existing channel audience"

# ===============================================================================
# CUT FREQUENCY MAP
# ===============================================================================

# Visual pacing guide for the editor
# Segments are defined by BEAT NAME, not fixed seconds.
# Actual second ranges come from duration_intelligence.duration_breakdown.
cut_frequency:
  - segment: "HOOK beat"
    cuts_per_second: 0.5  # Cut every 2 seconds
    note: "Fast pace to capture attention"
  - segment: "CONTEXT beat"
    cuts_per_second: 0.33  # Cut every 3 seconds
    note: "Settle slightly"
  - segment: "VALUE beat"
    cuts_per_second: 0.25  # Cut every 4 seconds
    note: "Let content breathe — pacing adapts to content rhythm"
  - segment: "PAYOFF beat"
    cuts_per_second: 0.5
    note: "Energy peaks again"
  - segment: "LOOP/CTA beat"
    cuts_per_second: 0
    note: "Single shot — clean ending"

# ===============================================================================
# SUMMARY
# ===============================================================================

sumario:
  duracao_final: 0  # seconds
  beats_count: 5
  momentos_usados: 0  # From banco
  text_overlays_count: 0
  hook_point_score: 0
  plataforma_principal: "{platform}"

