  viral_triggers:
    path: "squads/curator/data/viral-triggers.yaml"
    purpose: "Viral trigger detection (lacuna, quebra, pico, etc.)"
    used_by: ["mine-transcript (Pass 2)"]

  moment_quality_rubric:
    path: "squads/curator/data/moment-quality-rubric.yaml"
    purpose: "MQR scoring dimensions and formula"
    used_by: ["mine-transcript (Pass 2)"]

  stt_corrections:
    path: "squads/curator/data/stt-corrections.yaml"
    purpose: "STT error correction patterns"
    used_by: ["apply_stt_corrections.py"]

  matthew_dicks_dna:
    path: "squads/curator/data/matthew-dicks-dna.yaml"
    purpose: "Matthew Dicks mind DNA for narrative agent"
    used_by: ["matthew-dicks agent"]
