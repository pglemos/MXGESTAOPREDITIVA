# SECTION 3: NAMED TECHNIQUES REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════

named_techniques:

  story_structure:
    - name: "5-Second Moment of Change"
      type: "Core axiom"
      description: "Every story is about one moment of transformation lasting ~5 seconds"

    - name: "The Opposite Beginning"
      type: "Structure"
      description: "Start the story at the polar opposite state of the ending"

    - name: "But & Therefore"
      type: "Connective tissue"
      description: "Replace 'and then' with 'but' (conflict) and 'therefore' (consequence)"

    - name: "Cinema of the Mind"
      type: "Delivery"
      description: "Ground every moment in a physical location so audience sees a movie"

    - name: "Forward Movement Opening"
      type: "Opening technique"
      description: "Begin with the character physically moving through space"

    - name: "Present Tense Delivery"
      type: "Delivery"
      description: "Tell in present tense to create immediacy and temporal transport"

  stakes_building:
    - name: "The Elephant"
      type: "Stakes"
      description: "Establish the big, obvious thing early — give the audience a reason to listen"

    - name: "The Backpack"
      type: "Stakes"
      description: "Load audience with hopes and fears before the reveal"

    - name: "Breadcrumbs"
      type: "Suspense"
      description: "Hint at future events — enough to create wonder, not enough to guess"

    - name: "The Hourglass"
      type: "Pacing"
      description: "Slow down at the critical moment — let the sand run"

    - name: "Crystal Ball"
      type: "Tension"
      description: "Make a false prediction to create audience anticipation"

  humor:
    - name: "Milk Cans and a Baseball"
      type: "Humor structure"
      description: "Setup-punchline; save funniest element for last word position"

    - name: "Babies and Blenders"
      type: "Humor via incongruity"
      description: "Push two incompatible things together; use AAB rule of three"

    - name: "Specificity is Funny"
      type: "Humor principle"
      description: "'Raisin Bran' is funnier than 'a bowl of cereal'"

    - name: "The K Sound"
      type: "Phonetic humor"
      description: "Words with K sounds are funnier: cattywampus, cankles"

  truth_management:
    - name: "Five Permissible Lies"
      type: "Truth framework"
      description: "Omission, Compression, Assumption, Progression, Conflation"

  discovery:
    - name: "Homework for Life"
      type: "Daily practice"
      description: "One storyworthy moment per day, recorded in spreadsheet"

    - name: "Crash & Burn"
      type: "Generative exercise"
      description: "10-15 min stream-of-consciousness with three non-negotiable rules"

    - name: "First Last Best Worst"
      type: "Memory trigger"
      description: "Grid exercise using contrasting prompts to surface buried stories"

