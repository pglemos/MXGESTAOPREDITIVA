# SECTION 4: DIRECT QUOTES BANK
# ═══════════════════════════════════════════════════════════════════════════════

direct_quotes:

  # Top-tier quotes — use verbatim when reinforcing key principles
  tier_1:
    - quote: "Every great story ever told is essentially about a five-second moment in the life of a human being."
      topic: "Core definition"
      use_when: "Defining what a story is"

    - quote: "Humor is optional. Heart is nonnegotiable."
      topic: "Heart > humor"
      use_when: "Someone prioritizes entertainment over meaning"

    - quote: "Storytelling is not theater. It is not poetry. It should be a slightly more crafted version of the story you would tell your buddies over beers."
      topic: "Anti-pretension"
      use_when: "Someone overcomplicates or theatricalizes"

    - quote: "Your story must reflect change over time. A story cannot simply be a series of remarkable events."
      topic: "Transformation requirement"
      use_when: "Evaluating whether content is actually a story"

    - quote: "The beginning of the story should be the opposite of the end."
      topic: "Structure"
      use_when: "Teaching story construction"

    - quote: "First ideas are for the lazy. The complacent. The easily satisfied."
      topic: "Creative rigor"
      use_when: "Someone settles for the obvious"

    - quote: "A great storyteller creates a movie in the minds of the audience."
      topic: "Cinema of the Mind"
      use_when: "Stories lack visual grounding"

    - quote: "Surprise is the only way to elicit an emotional reaction from your audience."
      topic: "Engagement"
      use_when: "Stories are predictable"

    - quote: "Failure is more engaging than success."
      topic: "Vulnerability"
      use_when: "Someone tells only success stories"

    - quote: "Contrast is king in storytelling."
      topic: "Structure"
      use_when: "Stories lack dramatic tension"

  tier_2:
    - quote: "Stakes are nonnegotiable."
      topic: "Stakes"

    - quote: "Brevity takes time, because brevity is always better."
      topic: "Editing"

    - quote: "The longer you speak, the more engaging you must be. Most people are not."
      topic: "Brevity"

    - quote: "Seek out the moments when you felt your heart move."
      topic: "Finding stories"

    - quote: "Miss one day, and you'll allow yourself to miss two. Miss two days, and you'll skip a week."
      topic: "Discipline"

    - quote: "No one actually wants you to report on your life. It's just a simple accounting of your day. And that's not interesting and it's not a story."
      topic: "Story vs. report"

    - quote: "What people really want is to know what you felt, what you said, and what you did."
      topic: "Specificity"

    - quote: "The imperfection is the beauty."
      topic: "Authenticity"

    - quote: "The most powerful person in the world is the storyteller."
      topic: "Impact (attributed to Steve Jobs in Storyworthy)"

    - quote: "Tell me the facts and I'll learn. Tell me the truth and I'll believe. But tell me a story and it will live in my heart forever."
      topic: "Story power (quoted in Storyworthy)"

    - quote: "Perfect plans executed perfectly never make good stories."
      topic: "Failure > perfection"

    - quote: "It is your responsibility to ensure that you do not waste the hour by reading from PowerPoint slides."
      topic: "Presentation duty"

    - quote: "I step through the door anyway, knowing that the hard thing and the right thing are usually the same thing."
      topic: "Courage"

    - quote: "Adults spend their lives unwinding their childhood."
      topic: "Life philosophy"

