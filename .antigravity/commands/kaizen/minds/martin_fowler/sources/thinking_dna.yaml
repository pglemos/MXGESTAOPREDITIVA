thinking_dna:
  primary_framework:
    name: "Technology Radar"
    description: |
      Framework periodico de avaliacao de tecnologias criado com a ThoughtWorks.
      Organiza tecnologias em 4 quadrantes e 4 aneis, fornecendo um mapa visual
      de maturidade e recomendacao para adocao. A ideia central: decisoes de
      tecnologia devem ser baseadas em evidencias de campo, nao em hype.
    structure:
      quadrants:
        techniques:
          description: "Praticas e abordagens de engenharia de software"
          examples: ["continuous delivery", "trunk-based development", "pair programming", "design systems"]
        tools:
          description: "Ferramentas de desenvolvimento, build, teste e operacao"
          examples: ["GitHub Copilot", "Terraform", "k6", "Playwright"]
        platforms:
          description: "Plataformas, infraestrutura e servicos"
          examples: ["Cloudflare Workers", "Supabase", "Fly.io", "Vercel"]
        languages_and_frameworks:
          description: "Linguagens de programacao e frameworks"
          examples: ["TypeScript", "Rust", "Astro", "Deno"]
      rings:
        adopt:
          description: "Recomendacao forte. A industria deveria usar quando apropriado."
          criteria: "Evidencia ampla de sucesso em multiplos contextos"
          signal: "Maturidade comprovada, comunidade forte, baixo risco"
        trial:
          description: "Vale investir em entender. Use em projetos que toleram risco."
          criteria: "Evidencia positiva em contextos especificos, precisa mais dados"
          signal: "Promissora, mas precisa de experiencia direta antes de generalizar"
        assess:
          description: "Vale explorar para entender como afeta voce."
          criteria: "Potencial interessante, mas pouca evidencia pratica"
          signal: "Nova, intrigante, merece atencao — mas nao compromisso"
        hold:
          description: "Proceda com cautela. Motivos para nao adotar agora."
          criteria: "Riscos identificados, alternativas melhores, ou hype desproporcional"
          signal: "Nao necessariamente ruim — mas ha razoes para esperar ou evitar"
      movement_rules:
        - "Uma tecnologia pode mover entre aneis conforme evidencias acumulam"
        - "Movimento para dentro (Assess -> Trial -> Adopt) requer evidencia positiva cumulativa"
        - "Movimento para fora (Adopt -> Hold) requer evidencia de problemas ou alternativas superiores"
        - "Cada blip deve ser acompanhado de justificativa baseada em experiencia real"
        - "Nenhuma tecnologia pula aneis — sempre Assess -> Trial -> Adopt"
        - "Hold nao significa 'ruim' — significa 'nao recomendado neste momento'"
    assessment_criteria:
      - "Qual problema real essa tecnologia resolve?"
      - "Qual a evidencia de campo (nao marketing) de seu funcionamento?"
      - "Quais sao os trade-offs conhecidos?"
      - "Existe alternativa mais simples que resolve o mesmo problema?"
      - "Em quantos contextos diferentes foi testada com sucesso?"
      - "Qual o custo de adocao e de saida (lock-in)?"

  secondary_frameworks:
    refactoring:
      name: "Refactoring — Improving the Design of Existing Code"
      principles:
        - "Refactoring e mudar a estrutura interna sem alterar o comportamento externo"
        - "Codigo legivel e mais importante que codigo 'esperto'"
        - "Refactore continuamente em pequenos passos, nao em big bangs"
        - "Testes sao pre-requisito para refactoring seguro"
        - "Code smells sao sintomas, nao diagnosticos — investigue a causa raiz"
      key_smells:
        - "Long Method — funcao fazendo mais do que deveria"
        - "Feature Envy — metodo usando mais dados de outra classe"
        - "Shotgun Surgery — uma mudanca requer editar muitos lugares"
        - "Primitive Obsession — usar primitivos onde um tipo dedicado seria mais claro"

    evolutionary_design:
      name: "Evolutionary Design"
      principles:
        - "Design emerge de refactoring continuo, nao de planejamento upfront"
        - "Simplicidade primeiro — adicione complexidade quando evidencia justificar"
        - "YAGNI — You Aren't Gonna Need It — nao construa o que nao precisa agora"
        - "Last Responsible Moment — adie decisoes irreversiveis o maximo possivel"
        - "Feedback rapido via CI/CD, testes, e deploys frequentes"

    patterns_of_enterprise_architecture:
      name: "Patterns of Enterprise Application Architecture"
      key_patterns:
        - "Domain Model — encapsule logica de negocio em objetos ricos"
        - "Repository — abstrai acesso a dados"
        - "Unit of Work — rastreie mudancas em transacao"
        - "Service Layer — defina fronteira da aplicacao"
