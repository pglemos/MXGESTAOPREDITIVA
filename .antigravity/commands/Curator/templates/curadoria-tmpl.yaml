# CURADORIA DE DADOS
# Notícias, tendências e estatísticas para enriquecer o conteúdo
# APENAS dados REAIS e VERIFICADOS

# ═══════════════════════════════════════════════════════════════════════════════
# METADADOS
# ═══════════════════════════════════════════════════════════════════════════════

metadata:
  curado_para: "{NOME_DO_CONTEUDO}"
  topicos_pesquisados:
    - "produtividade"
    - "burnout"
    - "trabalho remoto"
  data_curadoria: "{YYYY-MM-DD}"
  curador: "data-curator v1.0"
  frameworks:
    - "I Am the Algorithm (Dave Pell)"
    - "Haystack Method (Rohit Bhargava)"

  # Contagem por tipo
  total_items: 8
  por_tipo:
    noticia: 3
    estatistica: 2
    tendencia: 2
    quote: 1
    evento: 0

# ═══════════════════════════════════════════════════════════════════════════════
# ITENS CURADOS
# ═══════════════════════════════════════════════════════════════════════════════

items:
  # ─────────────────────────────────────────────────────────────────────────────
  # ITEM #1 - ESTATÍSTICA
  # ─────────────────────────────────────────────────────────────────────────────
  - id: 1
    tipo: "estatistica"
    topico: "produtividade"

    # DADO
    valor: "67%"
    metrica: "dos funcionários estão desengajados no trabalho"
    contexto: "Segundo pesquisa global com 142 países"

    # FONTE (OBRIGATÓRIA)
    fonte: "Gallup State of the Global Workplace 2024"
    fonte_url: "https://www.gallup.com/workplace/349484/state-of-the-global-workplace.aspx"
    data_publicacao: "2024-06"

    # USO SUGERIDO
    relevancia: "Suporta argumento sobre desengajamento ser resultado de falta de clareza"
    encaixe_sugerido: "overlay ou menção após momento #3"
    tipo_uso: "overlay"  # overlay | menção_verbal | b-roll | card

    # CONFIANÇA
    confianca: "alta"  # alta | media | baixa
    verificado: true

  # ─────────────────────────────────────────────────────────────────────────────
  # ITEM #2 - NOTÍCIA
  # ─────────────────────────────────────────────────────────────────────────────
  - id: 2
    tipo: "noticia"
    topico: "produtividade"

    # DADO
    headline: "Microsoft Japan experimenta semana de 4 dias e vê produtividade aumentar 40%"
    resumo: "Experimento de agosto 2019 resultou em aumento de 40% na produtividade e redução de 23% no consumo de energia"

    # FONTE
    fonte: "BBC News"
    fonte_url: "https://www.bbc.com/news/..."
    data_publicacao: "2019-11-04"

    # USO SUGERIDO
    relevancia: "Exemplo concreto de que menos horas = mais resultado"
    encaixe_sugerido: "após história do cliente (momento #2)"
    tipo_uso: "menção_verbal"

    # CONFIANÇA
    confianca: "alta"
    verificado: true
    nota: "Dado de 2019, mas ainda relevante e muito citado"

  # ─────────────────────────────────────────────────────────────────────────────
  # ITEM #3 - TENDÊNCIA
  # ─────────────────────────────────────────────────────────────────────────────
  - id: 3
    tipo: "tendencia"
    topico: "trabalho remoto"

    # DADO
    nome: "Rise of Asynchronous Work"
    evidencia: "Empresas como GitLab, Doist e Automattic operam 100% assíncrono"
    implicacao: "Foco em output, não em horas trabalhadas, está se tornando padrão"

    # FONTE
    fonte: "GitLab Remote Work Report 2024"
    fonte_url: "https://about.gitlab.com/company/culture/all-remote/"
    data_publicacao: "2024-03"

    # USO SUGERIDO
    relevancia: "Valida o ponto sobre contexto mental > horas"
    encaixe_sugerido: "no final, como validação de tendência"
    tipo_uso: "menção_verbal"

    # CONFIANÇA
    confianca: "alta"
    verificado: true

  # ─────────────────────────────────────────────────────────────────────────────
  # ITEM #4 - QUOTE DE EXPERT
  # ─────────────────────────────────────────────────────────────────────────────
  - id: 4
    tipo: "quote"
    topico: "produtividade"

    # DADO
    citacao: "Produtividade não é sobre fazer mais coisas, é sobre fazer as coisas certas."
    pessoa: "Peter Drucker"
    cargo: "Considerado o pai da administração moderna"
    contexto: "The Effective Executive (1967)"

    # FONTE
    fonte: "The Effective Executive - Peter Drucker"
    fonte_url: null
    data_publicacao: "1967"

    # USO SUGERIDO
    relevancia: "Reforça tese central com autoridade"
    encaixe_sugerido: "card quote ou menção no fechamento"
    tipo_uso: "card"

    # CONFIANÇA
    confianca: "alta"
    verificado: true

  # ... continua com mais itens

