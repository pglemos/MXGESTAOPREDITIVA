# ===============================================================================
# TEMPLATE: Narrative Structure v1.0
# Purpose: Structured narrative arc from mined moments
# Generated by: Tier 1 agents (ken-burns, walter-murch, matthew-dicks)
# Input: {source-slug}/momentos.md (output of mine-transcript)
# Output: narrative_structure.yaml
# Used in: wf-longform-pipeline.yaml (Phase 1)
# ===============================================================================

# NARRATIVE STRUCTURE
# Assembly order for video editor — NOT chronological, follows narrative logic
# Each moment references an ID from {source-slug}/momentos.md

# ===============================================================================
# METADATA
# ===============================================================================

metadata:
  source: "{SOURCE_NAME}"
  source_file: "output/curated/{source-slug}/momentos.md"
  narrative_style: "{blind-assembly | rule-of-six | 5-second}"
  architect: "{ken-burns | walter-murch | matthew-dicks}"
  generated_at: "{YYYY-MM-DD}"
  total_moments_used: 0  # Count of moments selected from banco
  total_moments_available: 0  # Count in source file
  estimated_duration: "{MM:SS}"
  target_platform: "{youtube_main | podcast_video | course}"

# ===============================================================================
# NARRATIVE ARC
# ===============================================================================

# Structure follows 5-act framework adapted for video:
#   Act 1: Hook + Setup (capture + context)
#   Act 2: Rising Action (build tension/curiosity)
#   Act 3: Climax (core insight/transformation)
#   Act 4: Falling Action (application/proof)
#   Act 5: Resolution (CTA + loop)

narrative_arc:
  acts:

    - act: 1
      name: "Hook + Setup"
      purpose: "Capture attention in first 5 seconds, establish context"
      target_duration: "{MM:SS}"
      moments:
        - moment_id: 0  # ID from {source-slug}/momentos.md
          role: "cold_open"  # cold_open | setup | context | teaser
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "Reason this moment opens the video"
          transition_to_next: "natural | hard_cut | question | callback"

        - moment_id: 0
          role: "setup"
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "Establishes the problem/question"
          transition_to_next: "natural"

    - act: 2
      name: "Rising Action"
      purpose: "Build tension, introduce evidence, deepen curiosity"
      target_duration: "{MM:SS}"
      moments:
        - moment_id: 0
          role: "evidence"  # evidence | story | contrast | data_point
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "Why this moment builds on the previous"
          transition_to_next: "natural"
          # Add more moments as needed

    - act: 3
      name: "Climax"
      purpose: "Deliver core insight or transformation moment"
      target_duration: "{MM:SS}"
      moments:
        - moment_id: 0
          role: "core_insight"  # core_insight | transformation | revelation
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "This is the payoff — why the audience stayed"
          transition_to_next: "pausa_intencional"

    - act: 4
      name: "Falling Action"
      purpose: "Application, proof, reinforce with examples"
      target_duration: "{MM:SS}"
      moments:
        - moment_id: 0
          role: "application"  # application | proof | case_study | quote
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "Makes the insight actionable or credible"
          transition_to_next: "natural"

    - act: 5
      name: "Resolution"
      purpose: "Close the loop, call to action"
      target_duration: "{MM:SS}"
      moments:
        - moment_id: 0
          role: "close"  # close | cta | callback | loop
          timestamp_inicio: "00:00:00"
          timestamp_fim: "00:00:00"
          duracao_segundos: 0
          why_here: "Closes the narrative arc"
          transition_to_next: null  # End

# ===============================================================================
# TRANSITION MAP
# ===============================================================================

# Defines how moments connect — critical for editor
transitions:
  - from_moment: 0
    to_moment: 0
    type: "natural"  # natural | hard_cut | question | callback | pause | bridge
    bridge_text: null  # Optional: text to bridge if not natural
    bridge_source: null  # Optional: timestamp of bridge phrase in source
    notes: "Editor instruction for this transition"

# ===============================================================================
# EMOTIONAL ENERGY MAP
# ===============================================================================

# Maps energy level across the narrative — editor uses for pacing
energy_map:
  - timestamp: "00:00"
    energy: 8  # 1-10
    note: "Hook — high energy capture"
  - timestamp: "01:00"
    energy: 5
    note: "Setup — settle into context"
  - timestamp: "03:00"
    energy: 7
    note: "Rising — story builds tension"
  - timestamp: "05:00"
    energy: 9
    note: "Climax — peak insight"
  - timestamp: "06:00"
    energy: 6
    note: "Application — practical"
  - timestamp: "07:00"
    energy: 7
    note: "Close — CTA energy"

# ===============================================================================
# UNUSED MOMENTS (for reference)
# ===============================================================================

# Moments from banco that were NOT used in this narrative
# Useful for: alternative cuts, social clips, B-roll decisions
unused_moments:
  - moment_id: 0
    reason: "Redundant with moment #X"  # redundant | off-topic | weak | too_long
  # List all unused moment IDs with reason

# ===============================================================================
# NARRATIVE RATIONALE
# ===============================================================================

rationale:
  style_justification: |
    Why this narrative style was chosen for this content.
    Reference the specific methodology:
    - blind-assembly (Ken Burns): When content is investigative/documentary
    - rule-of-six (Walter Murch): When emotional depth is priority
    - 5-second (Matthew Dicks): When story transformation is the core

  moment_selection_criteria: |
    How moments were selected for the narrative:
    - Priority: moments with highest impact_score that serve the arc
    - Diversity: mix of types (hook, insight, story, quote)
    - Flow: moments that transition naturally
    - Coverage: no large gaps in the narrative

  alternative_structures: |
    What other arrangements were considered and why rejected.

# ===============================================================================
# QUALITY CHECKLIST (inline)
# ===============================================================================

quality_checklist:
  - "[ ] Every moment has exact timestamps from source"
  - "[ ] Assembly order creates coherent narrative (not just chronological)"
  - "[ ] All 5 acts populated with at least 1 moment each"
  - "[ ] Transitions defined between all adjacent moments"
  - "[ ] Energy map shows variation (no flat line)"
  - "[ ] Cold open is the strongest hook available"
  - "[ ] Climax delivers on the hook's promise"
  - "[ ] No moment used without clear role justification"
  - "[ ] Unused moments documented with reason"
  - "[ ] Total duration within target range"
