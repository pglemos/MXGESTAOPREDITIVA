<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B2E" />
    <meta name="description" content="MX PERFORMANCE - plataforma operacional da MX Consultoria para visitas e sincronizacao autorizada com Google Calendar" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MX PERFORMANCE" />
    <link rel="icon" type="image/png" href="/mx-logo.png" />
    <link rel="apple-touch-icon" href="/mx-logo.png" />
    <title>MX PERFORMANCE</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        if (!window.location.pathname.startsWith('/pre-cadastro')) return;

        var resetKey = 'mx-pre-cadastro-cache-reset-v4';
        var alreadyReset = false;
        var clearCaches = [];

        try {
          alreadyReset = window.sessionStorage.getItem(resetKey) === '1';
        } catch (error) {}

        if ('serviceWorker' in navigator) {
          clearCaches.push(
            navigator.serviceWorker.getRegistrations()
              .then(function (registrations) {
                return Promise.all(registrations.map(function (registration) {
                  return registration.unregister();
                }));
              })
              .catch(function () {})
          );
        }

        if ('caches' in window) {
          clearCaches.push(
            caches.keys()
              .then(function (cacheNames) {
                return Promise.all(cacheNames.map(function (cacheName) {
                  return caches.delete(cacheName);
                }));
              })
              .catch(function () {})
          );
        }

        Promise.all(clearCaches).then(function () {
          if (alreadyReset || !navigator.serviceWorker || !navigator.serviceWorker.controller) return;
          try {
            window.sessionStorage.setItem(resetKey, '1');
          } catch (error) {}
          var url = new URL(window.location.href);
          url.searchParams.set('cache_bust', String(Date.now()));
          window.location.replace(url.toString());
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
