storyId: story-purge-01
createdAt: 2026-04-02T22:10:00Z
createdBy: "@architect"
status: in_progress
complexity: COMPLEX
estimatedEffort: "5-7 days"

dependencies:
  - name: zod
    version: "^3.22.0"
    purpose: Schema validation
  - name: lucide-react
    version: "latest"
    purpose: Icon unification

phases:
  - id: phase-1
    name: Setup & Design Unification
    description: Padronização de tokens e componentes base para todas as telas.
    subtasks:
      - id: "1.1"
        description: Unificar Design Tokens no tailwind.config.ts e index.css
        service: frontend
        files: [src/index.css, tailwind.config.js]
        verification:
          type: command
          command: npm run build
        status: done

      - id: "1.3"
        description: Alinhar componentes base e pontos auditados ao design system MX
        service: frontend
        files:
          - src/index.css
          - src/components/LegacyModuleShell.tsx
          - src/components/Layout.tsx
          - src/components/ui/avatar.tsx
          - src/components/ui/badge.tsx
          - src/components/ui/card.tsx
          - src/components/ui/chart.tsx
          - src/components/ui/checkbox.tsx
          - src/components/ui/dialog.tsx
          - src/components/ui/dropdown-menu.tsx
          - src/components/ui/progress.tsx
          - src/components/ui/select.tsx
          - src/components/ui/sonner.tsx
          - src/components/ui/switch.tsx
          - src/components/ui/table.tsx
          - src/components/ui/tabs.tsx
          - src/components/ui/textarea.tsx
          - src/components/ui/toaster.tsx
          - src/components/ui/tooltip.tsx
          - src/pages/ConsultorTreinamentos.tsx
          - src/pages/DashboardLoja.tsx
          - src/pages/Equipe.tsx
          - src/pages/Gamification.tsx
          - src/pages/Login.tsx
          - src/pages/MorningReport.tsx
          - src/pages/NotFound.tsx
          - src/pages/PainelConsultor.tsx
          - src/pages/Perfil.tsx
          - src/pages/Privacy.tsx
          - src/pages/SellerPerformance.tsx
          - src/pages/Terms.tsx
          - src/pages/Treinamentos.tsx
        verification:
          type: command
          command: npm run lint && npm run typecheck && npm test && npm run build
        status: done

      - id: "1.2"
        description: Refatorar LegacyModuleShell para suportar layout fluido e responsivo
        service: frontend
        files: [src/components/LegacyModuleShell.tsx]
        verification:
          type: browser
          url: http://localhost:3000/financeiro
        status: pending

  - id: phase-2
    name: Core Cockpit Integration
    description: Substituição de mocks e correção de lógica no painel central.
    subtasks:
      - id: "2.1"
        description: Integrar PainelConsultor com queries reais e corrigir lógica de pacing
        service: frontend
        files: [src/pages/PainelConsultor.tsx, src/hooks/useData.ts]
        verification:
          type: e2e
          testFile: tests/e2e/painel.spec.ts
        status: pending

      - id: "2.2"
        description: Corrigir validação de CNPJ e e-mail no cadastro de lojas
        service: frontend
        files: [src/pages/Lojas.tsx]
        verification:
          type: manual
          instructions: Testar criação de loja com e-mail inválido.
        status: pending

  - id: phase-3
    name: CRM & LeadOps Liquidation
    description: Limpeza de performance e lógica no motor de vendas.
    subtasks:
      - id: "3.1"
        description: Implementar useMemo e Debounce na busca de Leads/LeadOps
        service: frontend
        files: [src/pages/Leads.tsx, src/pages/LeadOps.tsx]
        verification:
          type: command
          command: npm run typecheck
        status: pending

      - id: "3.2"
        description: Corrigir links de WhatsApp e integração tel: protocol
        service: frontend
        files: [src/pages/LeadOps.tsx]
        verification:
          type: manual
          instructions: Clicar no ícone de whats e verificar link formatado.
        status: pending

  - id: phase-4
    name: Intelligence & Realtime
    description: Integração real da IA e notificações em tempo real.
    subtasks:
      - id: "4.1"
        description: Substituir mocks de IA por chamadas reais (ou placeholders de API)
        service: backend
        files: [src/pages/AiDiagnostics.tsx, src/pages/MorningReport.tsx]
        verification:
          type: api
          url: http://localhost:3000/api/ai/diagnostic
        status: pending

      - id: "4.2"
        description: Implementar "Marcar Todas Lidas" nas notificações
        service: frontend
        files: [src/pages/Notificacoes.tsx, src/hooks/use-notifications.ts]
        verification:
          type: manual
          instructions: Clicar em marcar todas e ver contador zerar.
        status: pending

  - id: phase-5
    name: Security & Types
    description: Extinguir 'any' e endurecer políticas de acesso.
    subtasks:
      - id: "5.1"
        description: Tipagem completa de profile e membership
        service: frontend
        files: [src/hooks/useAuth.tsx, src/pages/Perfil.tsx]
        verification:
          type: command
          command: npm run typecheck
        status: pending

      - id: "5.2"
        description: Auditoria de RLS nas tabelas core (feedbacks, goals)
        service: database
        files: [supabase/migrations/20240101_rls_audit.sql]
        verification:
          type: command
          command: supabase test db
        status: pending

  - id: phase-6
    name: Final Audit
    description: Verificação final de todas as micro-interações.
    subtasks:
      - id: "6.1"
        description: Rodar auditoria visual final (Screenshots) em produção
        service: infra
        files: [validate-visual.cjs]
        verification:
          type: browser
          url: https://mxgestaopreditiva.vercel.app
        status: pending
